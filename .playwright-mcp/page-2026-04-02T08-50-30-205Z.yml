          - paragraph [ref=e556]: Currently, we offer live online classes which have proven to be more effective and convenient for Pune families. Students from Hinjewadi, Wakad, Baner, Kothrud, Viman Nagar, and all other areas can join from home. This saves travel time (especially important given Pune's traffic!) and allows flexible scheduling around school and tuition timings. Our online classes are fully interactive with screen sharing, live coding, and real-time doubt clearing.
