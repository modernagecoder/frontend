        - list [ref=e369]:
          - listitem [ref=e370]:
            - generic [ref=e371] [cursor=pointer]:
              - heading "Does my child need any prior coding experience?" [level=4] [ref=e372]
              - img [ref=e373]
            - paragraph [ref=e375]: Not at all! We start completely from scratch (pun intended). The first session assumes zero experience. We have had kids as young as 5 thrive in our program.
          - generic [ref=e376]:
            - generic [ref=e377] [cursor=pointer]:
              - heading "What equipment does my child need?" [level=4] [ref=e378]
              - img [ref=e379]
            - paragraph [ref=e381]: A laptop or desktop (Windows, Mac, or Linux), a stable internet connection, and headphones with a microphone. All software is free — just a web browser required for Scratch.
          - generic [ref=e382]:
            - generic [ref=e383] [cursor=pointer]:
              - heading "How long is each session?" [level=4] [ref=e384]
              - img [ref=e385]
            - paragraph [ref=e387]: 60 to 75 minutes per session — long enough for meaningful learning, short enough to keep kids engaged. Sessions are interactive with breaks built in.
          - generic [ref=e388]:
            - generic [ref=e389] [cursor=pointer]:
              - heading "My child is 5. Is that too young?" [level=4] [ref=e390]
              - img [ref=e391]
            - paragraph [ref=e393]: We have successfully taught children as young as 5. Contact us so we can assess your child's readiness and match them to the right batch and mentor.
          - generic [ref=e394]:
            - generic [ref=e395] [cursor=pointer]:
              - heading "Will my child be safe online?" [level=4] [ref=e396]
              - img [ref=e397]
            - paragraph [ref=e399]: All sessions are password-protected Zoom classrooms with trusted educators. We follow strict child-safety policies and all instructors are background-verified.
          - generic [ref=e400]:
            - generic [ref=e401] [cursor=pointer]:
              - heading "What if my child misses a class?" [level=4] [ref=e402]
