        - generic [ref=e370]:
          - generic [ref=e371]:
            - generic [ref=e372] [cursor=pointer]:
              - heading "Do I need any prior coding experience?" [level=4] [ref=e373]
              - img [ref=e374]
            - paragraph [ref=e376]: Zero experience needed. We start from absolute basics. The curriculum is designed for complete beginners who want to reach a professional level as efficiently as possible.
          - generic [ref=e377]:
            - generic [ref=e378] [cursor=pointer]:
              - heading "I work full-time. Can I still keep up?" [level=4] [ref=e379]
              - img [ref=e380]
            - paragraph [ref=e382]: Absolutely. We schedule evening and weekend batches specifically for working professionals. Sessions are recorded, so you never fall behind. Expect 1–2 hours of practice between sessions.
          - generic [ref=e383]:
            - generic [ref=e384] [cursor=pointer]:
              - heading "I'm outside India — can I join?" [level=4] [ref=e385]
              - img [ref=e386]
            - paragraph [ref=e388]: Yes! We have learners from 30+ countries. International participants pay $60 USD. Contact us to find a time-zone-friendly batch. All sessions are 100% online via Zoom.
          - generic [ref=e389]:
            - generic [ref=e390] [cursor=pointer]:
              - heading "Will 16 sessions really be enough to get a job?" [level=4] [ref=e391]
              - img [ref=e392]
            - paragraph [ref=e394]: These 16 sessions give you the foundation and portfolio to start applying for junior roles and freelance work. Most career switchers continue learning independently after the camp — but the first job is achievable within 3–6 months of completing this.
          - generic [ref=e395]:
            - generic [ref=e396] [cursor=pointer]:
              - heading "What age is too old to learn coding?" [level=4] [ref=e397]
              - img [ref=e398]
            - paragraph [ref=e400]: There is no age limit. We have successfully taught learners in their 50s and 60s. The key is motivation — and you already have it. Modern tools and AI assistants make coding more accessible than ever before.
          - generic [ref=e401]:
            - generic [ref=e402] [cursor=pointer]:
              - heading "What if I miss a class?" [level=4] [ref=e403]
              - img [ref=e404]
            - paragraph [ref=e406]: All sessions are recorded. Watch anytime and book a 15-minute 1:1 catch-up with the instructor if needed. No one gets left behind.
