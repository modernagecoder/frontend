# Netlify Configuration for Frontend

[build]
  # Generate blog and course content before deployment
  command = "npm install && npm run generate:all && npm run build:inline && npm run minify && cd lovewall && npm install && npm run build && cd .."
  publish = "."
  functions = "api"

# API Function redirects
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Redirect rules for clean URLs
[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/about.html"
  to = "/about"
  status = 301
  force = true

[[redirects]]
  from = "/course.html"
  to = "/courses"
  status = 301
  force = true

[[redirects]]
  from = "/pricing.html"
  to = "/pricing"
  status = 301
  force = true

[[redirects]]
  from = "/contact.html"
  to = "/contact"
  status = 301
  force = true

[[redirects]]
  from = "/faq.html"
  to = "/faq"
  status = 301
  force = true

[[redirects]]
  from = "/terms.html"
  to = "/terms"
  status = 301
  force = true

[[redirects]]
  from = "/privacy.html"
  to = "/privacy"
  status = 301
  force = true

[[redirects]]
  from = "/login.html"
  to = "/login"
  status = 301
  force = true

# Static asset redirects (must come before page redirects)
[[redirects]]
  from = "/css/*"
  to = "/src/css/:splat"
  status = 200

[[redirects]]
  from = "/js/*"
  to = "/src/js/:splat"
  status = 200

[[redirects]]
  from = "/images/*"
  to = "/public/images/:splat"
  status = 200

[[redirects]]
  from = "/favicon/*"
  to = "/public/favicon/:splat"
  status = 200

[[redirects]]
  from = "/favicon.ico"
  to = "/public/favicon/favicon.ico"
  status = 200

[[redirects]]
  from = "/admin/*"
  to = "/src/admin/:splat"
  status = 200

# Lovewall assets (built files)
[[redirects]]
  from = "/assets/*"
  to = "/lovewall/dist/assets/:splat"
  status = 200

