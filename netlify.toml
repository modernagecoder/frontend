# Course category URLs (must come before individual courses)
[[redirects]]
  from = "/courses/coding/*"
  to = "/src/pages/course.html"
  status = 200

[[redirects]]
  from = "/courses/mathematics/*"
  to = "/src/pages/course.html"
  status = 200

# Course static assets (CSS, JS, images)
[[redirects]]
  from = "/content/courses/generated/*"
  to = "/content/courses/generated/:splat"
  status = 200

# Explicitly disable Pretty URLs to prevent redirect loops
# (Pretty URLs auto-adds trailing slashes which conflict with trailing-slash-stripping rules)
[build.processing.html]
  pretty_urls = false

