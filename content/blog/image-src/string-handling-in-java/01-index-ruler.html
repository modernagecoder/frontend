<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../base.css"><style>
:root{--w:1200px;--h:675px;--blue:#2b6cb0}
.fit{gap:20px;align-items:center}
.ruler{display:flex;gap:8px}
.cell{display:flex;flex-direction:column;align-items:center;gap:6px}
.tile{width:88px;height:88px;border:4px solid var(--ink);border-radius:14px;background:var(--card);box-shadow:4px 5px 0 var(--ink);display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:46px}
.cell.sub .tile{background:#B7E4CF;box-shadow:4px 5px 0 var(--pine)}
.idx{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:20px;color:#8a8478}
.bracewrap{display:flex;width:100%;justify-content:center}
.brace{display:flex;flex-direction:column;align-items:center;margin-left:192px;margin-right:auto}
.bline{width:280px;height:14px;border:3px solid var(--pine);border-top:none;border-radius:0 0 12px 12px}
.blab{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:24px;color:var(--pine);margin-top:6px}
.facts{display:flex;gap:18px}
.fact{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:21px;border:3px solid var(--ink);border-radius:11px;padding:8px 18px;background:var(--card);box-shadow:3px 4px 0 var(--ink)}
.fact b{color:var(--coral)}
.note{font-family:'Caveat',cursive;font-weight:700;font-size:34px;color:var(--coral)}
</style></head>
<body><div class="frame">
  <div class="brand-row"><span class="logo"><svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg"><rect width="512" height="512" fill="#007bff"/><g fill="none" stroke="#fff" stroke-linecap="round" stroke-linejoin="round"><path d="M116 85 C 75 85, 70 120, 70 145 V 225 C 70 250, 50 256, 40 256 C 50 256, 70 262, 70 287 V 367 C 70 392, 75 427, 116 427" stroke-width="12"/><path d="M396 85 C 437 85, 442 120, 442 145 V 225 C 442 250, 462 256, 472 256 C 462 256, 442 262, 442 287 V 367 C 442 392, 437 427, 396 427" stroke-width="12"/><line x1="182" y1="190" x2="182" y2="300" stroke-width="10"/><line x1="330" y1="190" x2="330" y2="300" stroke-width="10"/><line x1="182" y1="190" x2="262" y2="256" stroke-width="10"/><line x1="330" y1="190" x2="250" y2="256" stroke-width="10"/></g><g fill="#fff"><circle cx="182" cy="190" r="41"/><circle cx="330" cy="190" r="41"/><path d="M182 256 A 41 41 0 1 0 182 338 C 182 338 182 380 148 412 L 140 420 C 160 420 200 390 223 300 A 41 41 0 0 0 182 256 Z"/><path d="M330 256 A 41 41 0 1 0 330 338 C 330 338 330 380 296 412 L 288 420 C 308 420 340 390 371 300 A 41 41 0 0 0 330 256 Z"/></g></svg></span><span class="brand-name">Modern Age Coders</span><span class="handle">the index ruler</span></div>
  <div class="main"><div class="fit">
    <span class="eyebrow">every method counts from this ruler</span>
    <div class="ruler">
      <div class="cell"><span class="tile">C</span><span class="idx">0</span></div>
      <div class="cell"><span class="tile">O</span><span class="idx">1</span></div>
      <div class="cell sub"><span class="tile">M</span><span class="idx">2</span></div>
      <div class="cell sub"><span class="tile">P</span><span class="idx">3</span></div>
      <div class="cell sub"><span class="tile">U</span><span class="idx">4</span></div>
      <div class="cell"><span class="tile">T</span><span class="idx">5</span></div>
      <div class="cell"><span class="tile">E</span><span class="idx">6</span></div>
      <div class="cell"><span class="tile">R</span><span class="idx">7</span></div>
    </div>
    <div class="bracewrap"><div class="brace"><div class="bline"></div><span class="blab">substring(2, 5) = "MPU"</span></div></div>
    <div class="facts">
      <span class="fact">length() = <b>8</b></span>
      <span class="fact">first: charAt(<b>0</b>)</span>
      <span class="fact">last: charAt(length() - <b>1</b>)</span>
    </div>
    <div class="note">start included, end excluded. draw this in the margin.</div>
  </div></div>
</div></body></html>
