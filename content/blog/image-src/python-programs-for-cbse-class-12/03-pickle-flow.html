<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../base.css"><style>
:root{--w:1200px;--h:675px;--blue:#2b6cb0}
.fit{gap:24px;align-items:center}
.flow{display:flex;align-items:center;gap:14px;justify-content:center}
.objbox{border:4px solid var(--ink);border-radius:16px;background:var(--card);padding:16px 20px;box-shadow:6px 7px 0 var(--pine);font-family:'JetBrains Mono',monospace;font-weight:700;font-size:19px;line-height:1.5;color:var(--ink)}
.objbox .k{color:var(--amber)}
.filebox{border:4px solid var(--ink);border-radius:16px;background:var(--ink);color:#e7e3ec;padding:20px 24px;box-shadow:6px 7px 0 var(--coral);display:flex;flex-direction:column;align-items:center;gap:6px}
.filebox .fname{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:24px;color:var(--yellow)}
.filebox .bytes{font-family:'JetBrains Mono',monospace;font-size:15px;color:#9c96a3;letter-spacing:2px}
.arrowcol{display:flex;flex-direction:column;align-items:center;gap:4px}
.arrowcol .fn{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:20px;padding:6px 14px;border:3px solid var(--ink);border-radius:10px;box-shadow:3px 4px 0 var(--ink)}
.arrowcol.dump .fn{background:#FDECE6;color:var(--coral)}
.arrowcol.load .fn{background:#DCF5E7;color:var(--pine)}
.arrowcol svg{display:block}
.note{font-family:'Caveat',cursive;font-weight:700;font-size:36px;color:var(--coral)}
</style></head>
<body><div class="frame">
  <div class="brand-row"><span class="logo"><svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg"><rect width="512" height="512" fill="#007bff"/><g fill="none" stroke="#fff" stroke-linecap="round" stroke-linejoin="round"><path d="M116 85 C 75 85, 70 120, 70 145 V 225 C 70 250, 50 256, 40 256 C 50 256, 70 262, 70 287 V 367 C 70 392, 75 427, 116 427" stroke-width="12"/><path d="M396 85 C 437 85, 442 120, 442 145 V 225 C 442 250, 462 256, 472 256 C 462 256, 442 262, 442 287 V 367 C 442 392, 437 427, 396 427" stroke-width="12"/><line x1="182" y1="190" x2="182" y2="300" stroke-width="10"/><line x1="330" y1="190" x2="330" y2="300" stroke-width="10"/><line x1="182" y1="190" x2="262" y2="256" stroke-width="10"/><line x1="330" y1="190" x2="250" y2="256" stroke-width="10"/></g><g fill="#fff"><circle cx="182" cy="190" r="41"/><circle cx="330" cy="190" r="41"/><path d="M182 256 A 41 41 0 1 0 182 338 C 182 338 182 380 148 412 L 140 420 C 160 420 200 390 223 300 A 41 41 0 0 0 182 256 Z"/><path d="M330 256 A 41 41 0 1 0 330 338 C 330 338 330 380 296 412 L 288 420 C 308 420 340 390 371 300 A 41 41 0 0 0 330 256 Z"/></g></svg></span><span class="brand-name">Modern Age Coders</span><span class="handle">the pickle round trip</span></div>
  <div class="main"><div class="fit">
    <span class="eyebrow">objects in, objects out</span>
    <div class="flow">
      <div class="objbox">[{<span class="k">"roll"</span>: 1,<br>&nbsp;&nbsp;<span class="k">"name"</span>: "Asha",<br>&nbsp;&nbsp;<span class="k">"marks"</span>: 92}, ...]</div>
      <div class="arrowcol dump">
        <span class="fn">pickle.dump()</span>
        <svg width="90" height="24" viewBox="0 0 90 24" fill="none"><path d="M4 12 H78 M78 12 L64 4 M78 12 L64 20" stroke="#D55B3D" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="filebox"><span class="fname">students.dat</span><span class="bytes">10101101 01001010</span><span class="bytes">mode: wb / rb</span></div>
      <div class="arrowcol load">
        <span class="fn">pickle.load()</span>
        <svg width="90" height="24" viewBox="0 0 90 24" fill="none"><path d="M4 12 H78 M78 12 L64 4 M78 12 L64 20" stroke="#15795A" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="objbox">the same list,<br>ready to search<br>or update</div>
    </div>
    <div class="note">dump going in, load coming out. never plain read() on a .dat</div>
  </div></div>
</div></body></html>
