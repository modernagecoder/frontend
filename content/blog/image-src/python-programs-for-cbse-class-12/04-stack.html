<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../base.css"><style>
:root{--w:1200px;--h:675px;--blue:#2b6cb0}
.fit{flex-direction:row;align-items:center;justify-content:center;gap:60px}
.tower{display:flex;flex-direction:column-reverse;gap:10px;align-items:center}
.plate{width:230px;border:4px solid var(--ink);border-radius:12px;background:var(--card);padding:12px 0;text-align:center;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:24px;box-shadow:5px 6px 0 var(--ink)}
.plate.top{background:var(--yellow);box-shadow:5px 6px 0 var(--amber)}
.base{width:300px;height:10px;background:var(--ink);border-radius:5px;margin-top:8px}
.towerwrap{display:flex;flex-direction:column;align-items:center}
.toplab{font-family:'Caveat',cursive;font-weight:700;font-size:30px;color:var(--amber);margin-bottom:6px}
.ops{display:flex;flex-direction:column;gap:22px}
.op{display:flex;align-items:center;gap:14px}
.op .fn{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:23px;border:3px solid var(--ink);border-radius:11px;padding:8px 18px;box-shadow:4px 5px 0 var(--ink)}
.op.push .fn{background:#DCF5E7;color:var(--pine)}
.op.pop .fn{background:#FDECE6;color:var(--coral)}
.op .desc{font-size:19px;color:#5c574d;max-width:280px;line-height:1.3}
.lifo{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:30px;background:var(--ink);color:#fff;border-radius:14px;padding:12px 24px;box-shadow:6px 7px 0 var(--coral);align-self:flex-start}
.lifo span{color:var(--yellow)}
</style></head>
<body><div class="frame">
  <div class="brand-row"><span class="logo"><svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg"><rect width="512" height="512" fill="#007bff"/><g fill="none" stroke="#fff" stroke-linecap="round" stroke-linejoin="round"><path d="M116 85 C 75 85, 70 120, 70 145 V 225 C 70 250, 50 256, 40 256 C 50 256, 70 262, 70 287 V 367 C 70 392, 75 427, 116 427" stroke-width="12"/><path d="M396 85 C 437 85, 442 120, 442 145 V 225 C 442 250, 462 256, 472 256 C 462 256, 442 262, 442 287 V 367 C 442 392, 437 427, 396 427" stroke-width="12"/><line x1="182" y1="190" x2="182" y2="300" stroke-width="10"/><line x1="330" y1="190" x2="330" y2="300" stroke-width="10"/><line x1="182" y1="190" x2="262" y2="256" stroke-width="10"/><line x1="330" y1="190" x2="250" y2="256" stroke-width="10"/></g><g fill="#fff"><circle cx="182" cy="190" r="41"/><circle cx="330" cy="190" r="41"/><path d="M182 256 A 41 41 0 1 0 182 338 C 182 338 182 380 148 412 L 140 420 C 160 420 200 390 223 300 A 41 41 0 0 0 182 256 Z"/><path d="M330 256 A 41 41 0 1 0 330 338 C 330 338 330 380 296 412 L 288 420 C 308 420 340 390 371 300 A 41 41 0 0 0 330 256 Z"/></g></svg></span><span class="brand-name">Modern Age Coders</span><span class="handle">the stack, drawn</span></div>
  <div class="main"><div class="fit">
    <div class="towerwrap">
      <span class="toplab">the top: all action happens here</span>
      <div class="tower">
        <span class="plate">"Maths"</span>
        <span class="plate">"Physics"</span>
        <span class="plate top">"CS"</span>
      </div>
      <div class="base"></div>
    </div>
    <div class="ops">
      <span class="lifo">Last in, <span>first out</span></span>
      <div class="op push"><span class="fn">push = stack.append(x)</span><span class="desc">New item lands on top.</span></div>
      <div class="op pop"><span class="fn">pop = stack.pop()</span><span class="desc">Top item leaves first. Check for the empty stack before popping.</span></div>
      <div class="op push"><span class="fn">peek = stack[-1]</span><span class="desc">Look at the top without removing it.</span></div>
    </div>
  </div></div>
</div></body></html>
