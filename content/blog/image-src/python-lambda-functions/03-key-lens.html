<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../base.css"><style>
:root{--w:1200px;--h:675px;--blue:#2b6cb0}
.fit{gap:16px;align-items:center}
.grid{display:grid;grid-template-columns:auto auto auto;gap:12px 26px;align-items:center;justify-content:center}
.hdr{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:20px;text-align:center}
.h1{color:var(--blue)} .h2{color:var(--amber)} .h3{color:var(--pine)}
.item{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:23px;background:#DCEBFA;border:3px solid var(--ink);border-radius:11px;padding:8px 18px;text-align:center}
.mea{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:23px;background:#FFF3C4;border:3px solid var(--ink);border-radius:11px;padding:8px 18px;text-align:center;color:var(--amber)}
.rank{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:23px;background:#B7E4CF;border:3px solid var(--ink);border-radius:11px;padding:8px 18px;text-align:center;color:var(--pine)}
.keyline{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:26px;background:var(--ink);color:#e7e3ec;border-radius:12px;padding:12px 24px;box-shadow:5px 6px 0 var(--coral)}
.keyline .y{color:var(--yellow)}
.note{font-family:'Caveat',cursive;font-weight:700;font-size:34px;color:var(--coral)}
</style></head>
<body><div class="frame">
  <div class="brand-row"><span class="logo"><svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg"><rect width="512" height="512" fill="#007bff"/><g fill="none" stroke="#fff" stroke-linecap="round" stroke-linejoin="round"><path d="M116 85 C 75 85, 70 120, 70 145 V 225 C 70 250, 50 256, 40 256 C 50 256, 70 262, 70 287 V 367 C 70 392, 75 427, 116 427" stroke-width="12"/><path d="M396 85 C 437 85, 442 120, 442 145 V 225 C 442 250, 462 256, 472 256 C 462 256, 442 262, 442 287 V 367 C 442 392, 437 427, 396 427" stroke-width="12"/><line x1="182" y1="190" x2="182" y2="300" stroke-width="10"/><line x1="330" y1="190" x2="330" y2="300" stroke-width="10"/><line x1="182" y1="190" x2="262" y2="256" stroke-width="10"/><line x1="330" y1="190" x2="250" y2="256" stroke-width="10"/></g><g fill="#fff"><circle cx="182" cy="190" r="41"/><circle cx="330" cy="190" r="41"/><path d="M182 256 A 41 41 0 1 0 182 338 C 182 338 182 380 148 412 L 140 420 C 160 420 200 390 223 300 A 41 41 0 0 0 182 256 Z"/><path d="M330 256 A 41 41 0 1 0 330 338 C 330 338 330 380 296 412 L 288 420 C 308 420 340 390 371 300 A 41 41 0 0 0 330 256 Z"/></g></svg></span><span class="brand-name">Modern Age Coders</span><span class="handle">how key= thinks</span></div>
  <div class="main"><div class="fit">
    <span class="eyebrow">sorted() compares the measurements, not the items</span>
    <div class="keyline">sorted(words, key=<span class="y">lambda w: len(w)</span>)</div>
    <div class="grid">
      <span class="hdr h1">the items</span><span class="hdr h2">what the lambda sees</span><span class="hdr h3">final order</span>
      <span class="item">"python"</span><span class="mea">6</span><span class="rank">1. "go"</span>
      <span class="item">"go"</span><span class="mea">2</span><span class="rank">2. "java"</span>
      <span class="item">"java"</span><span class="mea">4</span><span class="rank">3. "python"</span>
      <span class="item">"javascript"</span><span class="mea">10</span><span class="rank">4. "javascript"</span>
    </div>
    <div class="note">read it as: sort by length</div>
  </div></div>
</div></body></html>
