<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../base.css"><style>
:root{--w:1200px;--h:630px;--blue:#2b6cb0}
.fit{flex-direction:row;align-items:center;gap:36px}
.left{flex:1;display:flex;flex-direction:column;gap:14px}
.left h1{font-size:80px}
.tag{align-self:flex-start;background:var(--ink);color:#fff;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:18px;letter-spacing:1px;padding:7px 15px;border-radius:9px}
/* golden-rectangle tiling: 8x5 grid of 44px units */
.tiling{flex:none;position:relative;width:calc(8*40px + 12px);height:calc(5*40px + 12px);transform:rotate(2deg)}
.blk{position:absolute;border:3px solid var(--ink);border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Bricolage Grotesque',sans-serif;font-weight:800;box-shadow:4px 5px 0 var(--ink)}
.b5{left:0;top:0;width:200px;height:200px;background:#FFD15A;font-size:56px}
.b3{left:206px;top:80px;width:120px;height:120px;background:#B7E4CF;font-size:40px}
.b2{left:206px;top:0;width:80px;height:74px;background:#F3B7A6;font-size:30px}
.b1a{left:292px;top:0;width:40px;height:34px;background:#DCEBFA;font-size:18px}
.b1b{left:292px;top:40px;width:40px;height:34px;background:#E0D4F5;font-size:18px}
.series{margin-top:6px;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:22px;color:var(--coral)}
.count{align-self:flex-start;background:var(--coral);color:#fff;border:3px solid var(--ink);border-radius:12px;padding:7px 18px;font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:23px;box-shadow:4px 5px 0 var(--ink)}
</style></head>
