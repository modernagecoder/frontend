<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../base.css"><style>
:root{--w:1200px;--h:675px;--blue:#2b6cb0}
.fit{gap:14px;align-items:center}
.rowseq{display:flex;gap:16px;align-items:center}
.term{width:78px;height:78px;border:4px solid var(--ink);border-radius:16px;background:var(--card);box-shadow:4px 5px 0 var(--ink);display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:38px}
.term.new{background:var(--yellow);box-shadow:4px 5px 0 var(--amber)}
.sums{display:flex;flex-direction:column;gap:10px;align-items:center;margin-top:6px}
.sumline{display:flex;align-items:center;gap:12px;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:28px;color:var(--ink)}
.sumline .a{background:#DCEBFA;border:3px solid var(--ink);border-radius:10px;padding:4px 14px;color:var(--blue)}
.sumline .b{background:#B7E4CF;border:3px solid var(--ink);border-radius:10px;padding:4px 14px;color:var(--pine)}
.sumline .r{background:var(--yellow);border:3px solid var(--ink);border-radius:10px;padding:4px 14px;box-shadow:3px 4px 0 var(--ink)}
.sumline .op{color:#8a8478}
.note{font-family:'Caveat',cursive;font-weight:700;font-size:36px;color:var(--coral)}
</style></head>
<body><div class="frame">
  <div class="brand-row"><span class="logo"><svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg"><rect width="512" height="512" fill="#007bff"/><g fill="none" stroke="#fff" stroke-linecap="round" stroke-linejoin="round"><path d="M116 85 C 75 85, 70 120, 70 145 V 225 C 70 250, 50 256, 40 256 C 50 256, 70 262, 70 287 V 367 C 70 392, 75 427, 116 427" stroke-width="12"/><path d="M396 85 C 437 85, 442 120, 442 145 V 225 C 442 250, 462 256, 472 256 C 462 256, 442 262, 442 287 V 367 C 442 392, 437 427, 396 427" stroke-width="12"/><line x1="182" y1="190" x2="182" y2="300" stroke-width="10"/><line x1="330" y1="190" x2="330" y2="300" stroke-width="10"/><line x1="182" y1="190" x2="262" y2="256" stroke-width="10"/><line x1="330" y1="190" x2="250" y2="256" stroke-width="10"/></g><g fill="#fff"><circle cx="182" cy="190" r="41"/><circle cx="330" cy="190" r="41"/><path d="M182 256 A 41 41 0 1 0 182 338 C 182 338 182 380 148 412 L 140 420 C 160 420 200 390 223 300 A 41 41 0 0 0 182 256 Z"/><path d="M330 256 A 41 41 0 1 0 330 338 C 330 338 330 380 296 412 L 288 420 C 308 420 340 390 371 300 A 41 41 0 0 0 330 256 Z"/></g></svg></span><span class="brand-name">Modern Age Coders</span><span class="handle">how it grows</span></div>
  <div class="main"><div class="fit">
    <span class="eyebrow">one rule, applied forever</span>
    <div class="rowseq">
      <span class="term">0</span><span class="term">1</span><span class="term">1</span><span class="term">2</span><span class="term">3</span><span class="term">5</span><span class="term new">8</span>
    </div>
    <div class="sums">
      <div class="sumline"><span class="a">0</span><span class="op">+</span><span class="b">1</span><span class="op">=</span><span class="r">1</span></div>
      <div class="sumline"><span class="a">1</span><span class="op">+</span><span class="b">1</span><span class="op">=</span><span class="r">2</span></div>
      <div class="sumline"><span class="a">1</span><span class="op">+</span><span class="b">2</span><span class="op">=</span><span class="r">3</span></div>
      <div class="sumline"><span class="a">2</span><span class="op">+</span><span class="b">3</span><span class="op">=</span><span class="r">5</span></div>
      <div class="sumline"><span class="a">3</span><span class="op">+</span><span class="b">5</span><span class="op">=</span><span class="r">8</span></div>
    </div>
    <div class="note">in code: a, b = b, a + b</div>
  </div></div>
</div></body></html>
