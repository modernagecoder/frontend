<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../base.css"><style>
:root{--w:1200px;--h:675px;--blue:#2b6cb0}
.fit{gap:10px;align-items:center}
.tree{display:flex;flex-direction:column;align-items:center;gap:0}
.lvl{display:flex;justify-content:center;gap:0;width:100%}
.node{font-family:'JetBrains Mono',monospace;font-weight:700;border:3px solid var(--ink);border-radius:12px;background:var(--card);box-shadow:3px 4px 0 var(--ink);padding:7px 14px;font-size:22px;margin:0 8px}
.n5{background:var(--yellow)}
.dup2{background:#F3B7A6}
.dup3{background:#B7E4CF}
.wire{height:22px;width:3px;background:transparent}
.lvl-wires{display:block;margin:-2px 0}
.legend{display:flex;gap:16px;margin-top:12px}
.leg{display:flex;align-items:center;gap:8px;font-size:19px;font-weight:600;color:#3b3833}
.leg .sw{width:24px;height:24px;border-radius:7px;border:3px solid var(--ink)}
.leg .s2{background:#F3B7A6} .leg .s3{background:#B7E4CF}
.note{font-family:'Caveat',cursive;font-weight:700;font-size:33px;color:var(--coral)}
</style></head>
<body><div class="frame">
  <div class="brand-row"><span class="logo"><svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg"><rect width="512" height="512" fill="#007bff"/><g fill="none" stroke="#fff" stroke-linecap="round" stroke-linejoin="round"><path d="M116 85 C 75 85, 70 120, 70 145 V 225 C 70 250, 50 256, 40 256 C 50 256, 70 262, 70 287 V 367 C 70 392, 75 427, 116 427" stroke-width="12"/><path d="M396 85 C 437 85, 442 120, 442 145 V 225 C 442 250, 462 256, 472 256 C 462 256, 442 262, 442 287 V 367 C 442 392, 437 427, 396 427" stroke-width="12"/><line x1="182" y1="190" x2="182" y2="300" stroke-width="10"/><line x1="330" y1="190" x2="330" y2="300" stroke-width="10"/><line x1="182" y1="190" x2="262" y2="256" stroke-width="10"/><line x1="330" y1="190" x2="250" y2="256" stroke-width="10"/></g><g fill="#fff"><circle cx="182" cy="190" r="41"/><circle cx="330" cy="190" r="41"/><path d="M182 256 A 41 41 0 1 0 182 338 C 182 338 182 380 148 412 L 140 420 C 160 420 200 390 223 300 A 41 41 0 0 0 182 256 Z"/><path d="M330 256 A 41 41 0 1 0 330 338 C 330 338 330 380 296 412 L 288 420 C 308 420 340 390 371 300 A 41 41 0 0 0 330 256 Z"/></g></svg></span><span class="brand-name">Modern Age Coders</span><span class="handle">why recursion crawls</span></div>
  <div class="main"><div class="fit">
    <span class="eyebrow">the call tree of fib(5)</span>
    <div class="tree">
      <div class="lvl"><span class="node n5">fib(5)</span></div>
      <svg class="lvl-wires" width="500" height="26" viewBox="0 0 500 26" fill="none"><path d="M250 2 L130 24 M250 2 L370 24" stroke="#201E24" stroke-width="3" stroke-linecap="round"/></svg>
      <div class="lvl"><span class="node">fib(4)</span><span style="width:120px"></span><span class="node dup3">fib(3)</span></div>
      <svg class="lvl-wires" width="700" height="26" viewBox="0 0 700 26" fill="none"><path d="M235 2 L120 24 M235 2 L330 24 M465 2 L420 24 M465 2 L560 24" stroke="#201E24" stroke-width="3" stroke-linecap="round"/></svg>
      <div class="lvl"><span class="node dup3">fib(3)</span><span class="node dup2">fib(2)</span><span style="width:60px"></span><span class="node dup2">fib(2)</span><span class="node">fib(1)</span></div>
      <svg class="lvl-wires" width="800" height="26" viewBox="0 0 800 26" fill="none"><path d="M180 2 L120 24 M180 2 L250 24 M310 2 L290 24 M310 2 L360 24 M520 2 L490 24 M520 2 L560 24" stroke="#201E24" stroke-width="3" stroke-linecap="round"/></svg>
      <div class="lvl"><span class="node dup2">fib(2)</span><span class="node">fib(1)</span><span class="node">fib(1)</span><span class="node">fib(0)</span><span class="node">fib(1)</span><span class="node">fib(0)</span></div>
      <div class="legend">
        <span class="leg"><span class="sw s3"></span>fib(3) computed 2 times</span>
        <span class="leg"><span class="sw s2"></span>fib(2) computed 3 times</span>
      </div>
    </div>
    <div class="note">at fib(30), the waste grows to 2.6 million calls</div>
  </div></div>
</div></body></html>
