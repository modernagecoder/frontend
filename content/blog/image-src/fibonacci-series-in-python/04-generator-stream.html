<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../base.css"><style>
:root{--w:1200px;--h:675px;--blue:#2b6cb0}
.fit{gap:22px;align-items:center}
.pipe{display:flex;align-items:center;gap:0}
.genbox{border:4px solid var(--ink);border-radius:18px;background:var(--ink);color:#e7e3ec;padding:20px 26px;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:22px;line-height:1.55;box-shadow:8px 9px 0 var(--pine)}
.genbox .y{color:var(--yellow)} .genbox .g{color:#6fcf97} .genbox .p{color:#c9a2ff}
.tube{width:70px;height:26px;background:#DCEBFA;border:3px solid var(--ink);border-left:none;border-right:none}
.tap{display:flex;flex-direction:column;align-items:center;gap:8px}
.tapcall{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:22px;background:var(--yellow);border:3px solid var(--ink);border-radius:12px;padding:8px 16px;box-shadow:4px 5px 0 var(--ink)}
.drops{display:flex;gap:10px;align-items:center}
.drop{width:54px;height:54px;border:3px solid var(--ink);border-radius:50%;background:#B7E4CF;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:24px;box-shadow:3px 4px 0 var(--pine)}
.drop.dim{background:#F7F1E2;color:#b9ae97;box-shadow:3px 4px 0 var(--line)}
.note{font-family:'Caveat',cursive;font-weight:700;font-size:36px;color:var(--coral);text-align:center}
.arw{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:30px;color:var(--coral);margin:0 8px}
</style></head>
<body><div class="frame">
  <div class="brand-row"><span class="logo"><svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg"><rect width="512" height="512" fill="#007bff"/><g fill="none" stroke="#fff" stroke-linecap="round" stroke-linejoin="round"><path d="M116 85 C 75 85, 70 120, 70 145 V 225 C 70 250, 50 256, 40 256 C 50 256, 70 262, 70 287 V 367 C 70 392, 75 427, 116 427" stroke-width="12"/><path d="M396 85 C 437 85, 442 120, 442 145 V 225 C 442 250, 462 256, 472 256 C 462 256, 442 262, 442 287 V 367 C 442 392, 437 427, 396 427" stroke-width="12"/><line x1="182" y1="190" x2="182" y2="300" stroke-width="10"/><line x1="330" y1="190" x2="330" y2="300" stroke-width="10"/><line x1="182" y1="190" x2="262" y2="256" stroke-width="10"/><line x1="330" y1="190" x2="250" y2="256" stroke-width="10"/></g><g fill="#fff"><circle cx="182" cy="190" r="41"/><circle cx="330" cy="190" r="41"/><path d="M182 256 A 41 41 0 1 0 182 338 C 182 338 182 380 148 412 L 140 420 C 160 420 200 390 223 300 A 41 41 0 0 0 182 256 Z"/><path d="M330 256 A 41 41 0 1 0 330 338 C 330 338 330 380 296 412 L 288 420 C 308 420 340 390 371 300 A 41 41 0 0 0 330 256 Z"/></g></svg></span><span class="brand-name">Modern Age Coders</span><span class="handle">the generator tap</span></div>
  <div class="main"><div class="fit">
    <span class="eyebrow">a tap, not a bucket</span>
    <div class="pipe">
      <div class="genbox"><span class="p">def</span> <span class="g">fibonacci</span>():<br>&nbsp;&nbsp;a, b = <span class="y">0</span>, <span class="y">1</span><br>&nbsp;&nbsp;<span class="p">while</span> <span class="y">True</span>:<br>&nbsp;&nbsp;&nbsp;&nbsp;<span class="p">yield</span> a<br>&nbsp;&nbsp;&nbsp;&nbsp;a, b = b, a + b</div>
      <div class="tube"></div>
      <div class="tap">
        <span class="tapcall">next(fib_gen)</span>
        <span class="arw" style="transform:rotate(90deg)">-&gt;</span>
        <div class="drops">
          <span class="drop">0</span><span class="drop">1</span><span class="drop">1</span><span class="drop">2</span><span class="drop">3</span><span class="drop dim">?</span>
        </div>
      </div>
    </div>
    <div class="note">each next() pours exactly one term. memory used: two numbers.</div>
  </div></div>
</div></body></html>
