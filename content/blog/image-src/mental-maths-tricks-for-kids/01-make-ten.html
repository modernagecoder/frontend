<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../base.css"><style>
:root{--w:1200px;--h:750px}
.fit{gap:20px;align-items:center}
.eyebrow{font-size:34px}
h1{font-size:46px;text-align:center}
.row{display:flex;align-items:center;gap:18px;justify-content:center}
.blk{border:4px solid var(--ink);border-radius:14px;width:96px;height:96px;display:flex;align-items:center;justify-content:center;font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:40px}
.b8{background:#DCF5E7;box-shadow:5px 6px 0 var(--pine);color:var(--pine)}
.b5{background:#FFF3C4;box-shadow:5px 6px 0 var(--amber);color:var(--amber)}
.b2{background:#FCE1D8;box-shadow:5px 6px 0 var(--coral);color:var(--coral);width:60px;height:60px;font-size:26px}
.b3{background:#FFF3C4;box-shadow:5px 6px 0 var(--amber);color:var(--amber);width:60px;height:60px;font-size:26px}
.b10{background:var(--ink);color:#fff;box-shadow:5px 6px 0 var(--coral)}
.plus{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:36px;color:#8a8478}
.arrow{font-size:38px;color:var(--coral)}
.eq{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:44px;color:var(--ink)}
.stack{display:flex;flex-direction:column;align-items:center;gap:4px}
.tiny{font-family:'JetBrains Mono',monospace;font-size:15px;color:#8a8478}
</style></head>
<body><div class="frame">
  <div class="brand-row"><span class="logo"><svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg"><rect width="512" height="512" fill="#007bff"/><g fill="none" stroke="#fff" stroke-linecap="round" stroke-linejoin="round"><path d="M116 85 C 75 85, 70 120, 70 145 V 225 C 70 250, 50 256, 40 256 C 50 256, 70 262, 70 287 V 367 C 70 392, 75 427, 116 427" stroke-width="12"/><path d="M396 85 C 437 85, 442 120, 442 145 V 225 C 442 250, 462 256, 472 256 C 462 256, 442 262, 442 287 V 367 C 442 392, 437 427, 396 427" stroke-width="12"/><line x1="182" y1="190" x2="182" y2="300" stroke-width="10"/><line x1="330" y1="190" x2="330" y2="300" stroke-width="10"/><line x1="182" y1="190" x2="262" y2="256" stroke-width="10"/><line x1="330" y1="190" x2="250" y2="256" stroke-width="10"/></g><g fill="#fff"><circle cx="182" cy="190" r="41"/><circle cx="330" cy="190" r="41"/><path d="M182 256 A 41 41 0 1 0 182 338 C 182 338 182 380 148 412 L 140 420 C 160 420 200 390 223 300 A 41 41 0 0 0 182 256 Z"/><path d="M330 256 A 41 41 0 1 0 330 338 C 330 338 330 380 296 412 L 288 420 C 308 420 340 390 371 300 A 41 41 0 0 0 330 256 Z"/></g></svg></span><span class="brand-name">Modern Age Coders</span><span class="handle">trick #4, worked out</span></div>
  <div class="main"><div class="fit">
    <span class="eyebrow">the make-ten trick</span>
    <h1>8 + 5, split so it is easy</h1>
    <div class="row">
      <div class="blk b8">8</div>
      <span class="plus">+</span>
      <div class="stack"><div class="blk b5">5</div><span class="tiny">split into 2 + 3</span></div>
    </div>
    <div class="row"><span class="arrow">&#8595;</span></div>
    <div class="row">
      <div class="blk b8">8</div>
      <span class="plus">+</span>
      <div class="blk b2">2</div>
      <span class="plus">+</span>
      <div class="blk b3">3</div>
    </div>
    <div class="row"><span class="arrow">&#8595;</span></div>
    <div class="row">
      <div class="blk b10">10</div>
      <span class="plus">+</span>
      <div class="blk b3">3</div>
      <span class="eq">= 13</span>
    </div>
  </div></div>
  <div class="foot"><div class="fl"><span class="site">learn.modernagecoders.com</span><span class="tiny">Once a child sees the split, the fingers come down</span></div><span class="pill">Number bonds</span></div>
</div></body></html>
