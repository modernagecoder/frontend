<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../base.css"><style>
:root{--w:1200px;--h:675px;--blue:#2b6cb0}
.fit{gap:20px}
.belt{display:flex;align-items:center;gap:12px;justify-content:center}
.stagebox{display:flex;flex-direction:column;align-items:center;gap:8px}
.stagelab{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:20px}
.in .stagelab{color:var(--blue)} .gate .stagelab{color:var(--coral)} .xform .stagelab{color:var(--amber)} .out .stagelab{color:var(--pine)}
.tray{display:flex;gap:8px;border:3px solid var(--ink);border-radius:14px;background:var(--card);padding:12px 14px;box-shadow:5px 6px 0 var(--ink)}
.chip2{width:46px;height:46px;border:3px solid var(--ink);border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:23px;background:#F7F1E2}
.in .chip2{background:#DCEBFA}
.gate .tray{background:#FDECE6}
.gate .chip2.pass{background:#B7E4CF}
.gate .chip2.drop{background:#FBF7EC;color:#d8d0bd;border-style:dashed}
.xform .chip2{background:#FFF3C4}
.out .chip2{background:#B7E4CF}
.cond{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:18px;color:var(--coral)}
.xform .cond{color:var(--amber)}
.flowarrow{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:34px;color:var(--ink);flex:none;padding-top:26px}
.code-line{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:24px;background:var(--ink);color:#e7e3ec;border-radius:12px;padding:12px 24px;align-self:center;box-shadow:5px 6px 0 var(--coral)}
.code-line .y{color:var(--yellow)} .code-line .g{color:#6fcf97} .code-line .r{color:#ff7a6b}
</style></head>
<body><div class="frame">
  <div class="brand-row"><span class="logo"><svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg"><rect width="512" height="512" fill="#007bff"/><g fill="none" stroke="#fff" stroke-linecap="round" stroke-linejoin="round"><path d="M116 85 C 75 85, 70 120, 70 145 V 225 C 70 250, 50 256, 40 256 C 50 256, 70 262, 70 287 V 367 C 70 392, 75 427, 116 427" stroke-width="12"/><path d="M396 85 C 437 85, 442 120, 442 145 V 225 C 442 250, 462 256, 472 256 C 462 256, 442 262, 442 287 V 367 C 442 392, 437 427, 396 427" stroke-width="12"/><line x1="182" y1="190" x2="182" y2="300" stroke-width="10"/><line x1="330" y1="190" x2="330" y2="300" stroke-width="10"/><line x1="182" y1="190" x2="262" y2="256" stroke-width="10"/><line x1="330" y1="190" x2="250" y2="256" stroke-width="10"/></g><g fill="#fff"><circle cx="182" cy="190" r="41"/><circle cx="330" cy="190" r="41"/><path d="M182 256 A 41 41 0 1 0 182 338 C 182 338 182 380 148 412 L 140 420 C 160 420 200 390 223 300 A 41 41 0 0 0 182 256 Z"/><path d="M330 256 A 41 41 0 1 0 330 338 C 330 338 330 380 296 412 L 288 420 C 308 420 340 390 371 300 A 41 41 0 0 0 330 256 Z"/></g></svg></span><span class="brand-name">Modern Age Coders</span><span class="handle">the conveyor belt</span></div>
  <div class="main"><div class="fit">
    <span class="eyebrow">in, filter, transform, out</span>
    <div class="belt">
      <div class="stagebox in"><span class="stagelab">1. Items ride in</span><div class="tray"><span class="chip2">1</span><span class="chip2">2</span><span class="chip2">3</span><span class="chip2">4</span></div></div>
      <span class="flowarrow">-&gt;</span>
      <div class="stagebox gate"><span class="stagelab">2. The if gate</span><div class="tray"><span class="chip2 drop">1</span><span class="chip2 pass">2</span><span class="chip2 drop">3</span><span class="chip2 pass">4</span></div><span class="cond">if n % 2 == 0</span></div>
      <span class="flowarrow">-&gt;</span>
      <div class="stagebox xform"><span class="stagelab">3. The expression</span><div class="tray"><span class="chip2">2x</span><span class="chip2">2x</span></div><span class="cond">n * 2</span></div>
      <span class="flowarrow">-&gt;</span>
      <div class="stagebox out"><span class="stagelab">4. New list</span><div class="tray"><span class="chip2">4</span><span class="chip2">8</span></div></div>
    </div>
    <div class="code-line">[<span class="y">n * 2</span> <span class="g">for n in [1, 2, 3, 4]</span> <span class="r">if n % 2 == 0</span>]&nbsp;&nbsp;gives&nbsp;&nbsp;[4, 8]</div>
  </div></div>
</div></body></html>
