<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../base.css"><style>
:root{--w:1200px;--h:675px}
.fit{gap:8px;align-items:center}
.map{display:flex;flex-direction:column;align-items:center}
.rowlab{align-self:flex-start;font-family:'Caveat',cursive;font-weight:700;font-size:30px;color:var(--coral)}
.tiles{display:flex;gap:22px}
.cell{display:flex;flex-direction:column;align-items:center;gap:6px}
.idx{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:20px;color:#8a8478}
.tile{width:92px;height:92px;border:4px solid var(--ink);border-radius:16px;background:var(--card);box-shadow:4px 5px 0 var(--ink);display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:48px}
.rev .tile{background:#B7E4CF;box-shadow:4px 5px 0 var(--pine)}
.first .tile{background:#FDECE6;box-shadow:4px 5px 0 var(--coral)}
.wires{display:block;margin:-2px 0}
.caption-line{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:26px;color:var(--ink);margin-top:10px;background:var(--yellow);border:3px solid var(--ink);border-radius:11px;padding:8px 20px;box-shadow:4px 5px 0 var(--ink)}
</style></head>
<body><div class="frame">
  <div class="brand-row"><span class="logo"><svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg"><rect width="512" height="512" fill="#007bff"/><g fill="none" stroke="#fff" stroke-linecap="round" stroke-linejoin="round"><path d="M116 85 C 75 85, 70 120, 70 145 V 225 C 70 250, 50 256, 40 256 C 50 256, 70 262, 70 287 V 367 C 70 392, 75 427, 116 427" stroke-width="12"/><path d="M396 85 C 437 85, 442 120, 442 145 V 225 C 442 250, 462 256, 472 256 C 462 256, 442 262, 442 287 V 367 C 442 392, 437 427, 396 427" stroke-width="12"/><line x1="182" y1="190" x2="182" y2="300" stroke-width="10"/><line x1="330" y1="190" x2="330" y2="300" stroke-width="10"/><line x1="182" y1="190" x2="262" y2="256" stroke-width="10"/><line x1="330" y1="190" x2="250" y2="256" stroke-width="10"/></g><g fill="#fff"><circle cx="182" cy="190" r="41"/><circle cx="330" cy="190" r="41"/><path d="M182 256 A 41 41 0 1 0 182 338 C 182 338 182 380 148 412 L 140 420 C 160 420 200 390 223 300 A 41 41 0 0 0 182 256 Z"/><path d="M330 256 A 41 41 0 1 0 330 338 C 330 338 330 380 296 412 L 288 420 C 308 420 340 390 371 300 A 41 41 0 0 0 330 256 Z"/></g></svg></span><span class="brand-name">Modern Age Coders</span><span class="handle">how it works</span></div>
  <div class="main"><div class="fit">
    <div class="map">
      <div class="tiles">
        <div class="cell first"><span class="idx">0</span><span class="tile">h</span></div>
        <div class="cell"><span class="idx">1</span><span class="tile">e</span></div>
        <div class="cell"><span class="idx">2</span><span class="tile">l</span></div>
        <div class="cell"><span class="idx">3</span><span class="tile">l</span></div>
        <div class="cell rev"><span class="idx">4</span><span class="tile">o</span></div>
      </div>
      <svg class="wires" width="548" height="120" viewBox="0 0 548 120" xmlns="http://www.w3.org/2000/svg" fill="none">
        <path d="M46 6 C 46 60, 502 60, 502 108" stroke="#D55B3D" stroke-width="5" stroke-linecap="round"/>
        <path d="M160 6 C 160 60, 388 60, 388 108" stroke="#B9AE97" stroke-width="4" stroke-linecap="round"/>
        <path d="M274 6 L 274 108" stroke="#B9AE97" stroke-width="4" stroke-linecap="round"/>
        <path d="M388 6 C 388 60, 160 60, 160 108" stroke="#B9AE97" stroke-width="4" stroke-linecap="round"/>
        <path d="M502 6 C 502 60, 46 60, 46 108" stroke="#15795A" stroke-width="5" stroke-linecap="round"/>
        <circle cx="502" cy="108" r="8" fill="#D55B3D"/>
        <circle cx="388" cy="108" r="7" fill="#B9AE97"/>
        <circle cx="274" cy="108" r="7" fill="#B9AE97"/>
        <circle cx="160" cy="108" r="7" fill="#B9AE97"/>
        <circle cx="46" cy="108" r="8" fill="#15795A"/>
      </svg>
      <div class="tiles">
        <div class="cell rev"><span class="tile">o</span></div>
        <div class="cell"><span class="tile">l</span></div>
        <div class="cell"><span class="tile">l</span></div>
        <div class="cell"><span class="tile">e</span></div>
        <div class="cell first"><span class="tile">h</span></div>
      </div>

  </div></div>
</div></body></html>
