<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../base.css"><style>
:root{--w:1200px;--h:675px}
.fit{gap:18px}
.lead{font-size:25px;color:#5c574d;font-weight:500}
.strip{display:flex;align-items:center;gap:14px;justify-content:center}
.stage{border:4px solid var(--ink);border-radius:16px;background:var(--card);box-shadow:6px 7px 0 var(--ink);padding:18px 20px;display:flex;flex-direction:column;align-items:center;gap:12px;min-width:190px}
.stage .pick{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:21px;color:#8a8478}
.stage .pick b{color:var(--coral)}
.word{display:flex;gap:5px}
.ch{width:44px;height:44px;border:3px solid var(--ink);border-radius:9px;background:#F7F1E2;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:26px}
.ch.new{background:#F3B7A6;box-shadow:0 0 0 0;border-color:var(--coral);color:var(--ink)}
.arw{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:34px;color:var(--pine)}
.tagline{font-family:'Caveat',cursive;font-weight:700;font-size:36px;color:var(--coral);text-align:center}
</style></head>
<body><div class="frame">
  <div class="brand-row"><span class="logo"><svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg"><rect width="512" height="512" fill="#007bff"/><g fill="none" stroke="#fff" stroke-linecap="round" stroke-linejoin="round"><path d="M116 85 C 75 85, 70 120, 70 145 V 225 C 70 250, 50 256, 40 256 C 50 256, 70 262, 70 287 V 367 C 70 392, 75 427, 116 427" stroke-width="12"/><path d="M396 85 C 437 85, 442 120, 442 145 V 225 C 442 250, 462 256, 472 256 C 462 256, 442 262, 442 287 V 367 C 442 392, 437 427, 396 427" stroke-width="12"/><line x1="182" y1="190" x2="182" y2="300" stroke-width="10"/><line x1="330" y1="190" x2="330" y2="300" stroke-width="10"/><line x1="182" y1="190" x2="262" y2="256" stroke-width="10"/><line x1="330" y1="190" x2="250" y2="256" stroke-width="10"/></g><g fill="#fff"><circle cx="182" cy="190" r="41"/><circle cx="330" cy="190" r="41"/><path d="M182 256 A 41 41 0 1 0 182 338 C 182 338 182 380 148 412 L 140 420 C 160 420 200 390 223 300 A 41 41 0 0 0 182 256 Z"/><path d="M330 256 A 41 41 0 1 0 330 338 C 330 338 330 380 296 412 L 288 420 C 308 420 340 390 371 300 A 41 41 0 0 0 330 256 Z"/></g></svg></span><span class="brand-name">Modern Age Coders</span><span class="handle">for-loop trace</span></div>
  <div class="main"><div class="fit">
    <span class="eyebrow">watch "code" flip itself</span>
    <div class="lead">Each character is placed in <strong>front</strong> of the result. Four steps, and it is reversed.</div>
    <div class="strip">
      <div class="stage">
        <span class="pick">ch = <b>'c'</b></span>
        <div class="word"><span class="ch new">c</span></div>
      </div>
      <span class="arw">-&gt;</span>
      <div class="stage">
        <span class="pick">ch = <b>'o'</b></span>
        <div class="word"><span class="ch new">o</span><span class="ch">c</span></div>
      </div>
      <span class="arw">-&gt;</span>
      <div class="stage">
        <span class="pick">ch = <b>'d'</b></span>
        <div class="word"><span class="ch new">d</span><span class="ch">o</span><span class="ch">c</span></div>
      </div>
      <span class="arw">-&gt;</span>
      <div class="stage">
        <span class="pick">ch = <b>'e'</b></span>
        <div class="word"><span class="ch new">e</span><span class="ch">d</span><span class="ch">o</span><span class="ch">c</span></div>
      </div>
    </div>
    <div class="tagline">result = ch + result ... that little line does all the work</div>
  </div></div>
</div></body></html>
