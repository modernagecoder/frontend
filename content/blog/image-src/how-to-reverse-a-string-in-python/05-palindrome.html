<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../base.css"><style>
:root{--w:1200px;--h:675px}
.fit{gap:10px;align-items:center}
.mirror{display:flex;flex-direction:column;align-items:center}
.tiles{display:flex;gap:20px;position:relative;padding-top:96px}
.tile{width:104px;height:104px;border:4px solid var(--ink);border-radius:18px;background:var(--card);box-shadow:5px 6px 0 var(--ink);display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:56px}
.tile.mid{background:var(--yellow);box-shadow:5px 6px 0 var(--amber)}
.tile.pair1{background:#B7E4CF;box-shadow:5px 6px 0 var(--pine)}
.tile.pair2{background:#FDECE6;box-shadow:5px 6px 0 var(--coral)}
.arcs{position:absolute;top:0;left:0;width:100%;height:96px}
.axis{width:3px;height:36px;background:repeating-linear-gradient(var(--ink) 0 6px,transparent 6px 12px);margin-top:6px}
.axislab{font-family:'Caveat',cursive;font-weight:700;font-size:30px;color:var(--amber)}
.check{margin-top:14px;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:30px;background:#B7E4CF;border:3px solid var(--ink);border-radius:12px;padding:10px 24px;box-shadow:4px 5px 0 var(--pine)}
.check b{color:var(--pine)}
</style></head>
<body><div class="frame">
  <div class="brand-row"><span class="logo"><svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg"><rect width="512" height="512" fill="#007bff"/><g fill="none" stroke="#fff" stroke-linecap="round" stroke-linejoin="round"><path d="M116 85 C 75 85, 70 120, 70 145 V 225 C 70 250, 50 256, 40 256 C 50 256, 70 262, 70 287 V 367 C 70 392, 75 427, 116 427" stroke-width="12"/><path d="M396 85 C 437 85, 442 120, 442 145 V 225 C 442 250, 462 256, 472 256 C 462 256, 442 262, 442 287 V 367 C 442 392, 437 427, 396 427" stroke-width="12"/><line x1="182" y1="190" x2="182" y2="300" stroke-width="10"/><line x1="330" y1="190" x2="330" y2="300" stroke-width="10"/><line x1="182" y1="190" x2="262" y2="256" stroke-width="10"/><line x1="330" y1="190" x2="250" y2="256" stroke-width="10"/></g><g fill="#fff"><circle cx="182" cy="190" r="41"/><circle cx="330" cy="190" r="41"/><path d="M182 256 A 41 41 0 1 0 182 338 C 182 338 182 380 148 412 L 140 420 C 160 420 200 390 223 300 A 41 41 0 0 0 182 256 Z"/><path d="M330 256 A 41 41 0 1 0 330 338 C 330 338 330 380 296 412 L 288 420 C 308 420 340 390 371 300 A 41 41 0 0 0 330 256 Z"/></g></svg></span><span class="brand-name">Modern Age Coders</span><span class="handle">palindrome check</span></div>
  <div class="main"><div class="fit">
    <span class="eyebrow">a word that is its own reverse</span>
    <div class="mirror">
      <div class="tiles">
        <svg class="arcs" viewBox="0 0 600 96" xmlns="http://www.w3.org/2000/svg" fill="none">
          <path d="M52 88 C 52 8, 548 8, 548 88" stroke="#15795A" stroke-width="5" stroke-linecap="round"/>
          <path d="M176 88 C 176 40, 424 40, 424 88" stroke="#D55B3D" stroke-width="5" stroke-linecap="round"/>
          <circle cx="52" cy="88" r="7" fill="#15795A"/><circle cx="548" cy="88" r="7" fill="#15795A"/>
          <circle cx="176" cy="88" r="7" fill="#D55B3D"/><circle cx="424" cy="88" r="7" fill="#D55B3D"/>
        </svg>
        <span class="tile pair1">l</span><span class="tile pair2">e</span><span class="tile mid">v</span><span class="tile pair2">e</span><span class="tile pair1">l</span>
      </div>
      <div class="axis"></div>
      <div class="axislab">mirror line</div>
      <div class="check">word == word[::-1] &nbsp;-&gt;&nbsp; <b>True</b></div>
    </div>
  </div></div>
</div></body></html>
