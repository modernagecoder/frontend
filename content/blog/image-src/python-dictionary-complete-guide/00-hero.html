<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../base.css"><style>
:root{--w:1200px;--h:630px;--blue:#2b6cb0}
.fit{flex-direction:row;align-items:center;gap:40px}
.left{flex:1;display:flex;flex-direction:column;gap:14px}
.left h1{font-size:78px}
.tag{align-self:flex-start;background:var(--ink);color:#fff;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:18px;letter-spacing:1px;padding:7px 15px;border-radius:9px}
.pairs{flex:none;display:flex;flex-direction:column;gap:14px;transform:rotate(2deg)}
.pair{display:flex;align-items:center;gap:0}
.key{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:24px;background:var(--yellow);border:3px solid var(--ink);border-radius:12px 0 0 12px;padding:12px 16px;box-shadow:4px 5px 0 var(--ink)}
.val{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:24px;background:var(--card);border:3px solid var(--ink);border-left:none;border-radius:0 12px 12px 0;padding:12px 16px;box-shadow:4px 5px 0 var(--ink)}
.pair.p2 .key{background:#F3B7A6}
.pair.p3 .key{background:#B7E4CF}
.count{align-self:center;margin-top:4px;background:var(--coral);color:#fff;border:3px solid var(--ink);border-radius:12px;padding:8px 20px;font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:24px;box-shadow:4px 5px 0 var(--ink)}
</style></head>
