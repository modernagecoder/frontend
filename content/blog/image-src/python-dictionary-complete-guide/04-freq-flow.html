<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../base.css"><style>
:root{--w:1200px;--h:675px;--blue:#2b6cb0}
.fit{gap:16px}
.flow{display:flex;align-items:stretch;gap:14px;justify-content:center}
.panel{border:4px solid var(--ink);border-radius:16px;background:var(--card);padding:16px 18px;display:flex;flex-direction:column;gap:10px;flex:0 1 330px}
.p1{box-shadow:7px 8px 0 var(--blue)} .p2{box-shadow:7px 8px 0 var(--amber)} .p3{box-shadow:7px 8px 0 var(--pine)}
.panel .hd{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:22px}
.p1 .hd{color:var(--blue)} .p2 .hd{color:var(--amber)} .p3 .hd{color:var(--pine)}
.sent{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:19px;line-height:1.5;color:var(--ink)}
.sent .th{background:#F3B7A6;border-radius:5px;padding:0 4px}
.words{display:flex;flex-wrap:wrap;gap:6px}
.w{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:17px;background:#F7F1E2;border:2px solid var(--line);border-radius:7px;padding:3px 9px}
.w.th{background:#F3B7A6;border-color:var(--ink)}
.tally{display:flex;flex-direction:column;gap:6px}
.trow{display:flex;align-items:center;gap:10px;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:19px}
.trow .k2{background:#FFF3C4;border:2px solid var(--ink);border-radius:7px;padding:3px 10px}
.trow.hot .k2{background:#F3B7A6}
.trow .c2{color:var(--pine);font-size:22px}
.arw{align-self:center;font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:38px;color:var(--coral);white-space:nowrap;flex:none}
.code-line{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:22px;background:var(--ink);color:#e7e3ec;border-radius:12px;padding:12px 22px;align-self:center;box-shadow:5px 6px 0 var(--coral)}
.code-line .g{color:#6fcf97}
</style></head>
<body><div class="frame">
  <div class="brand-row"><span class="logo"><svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg"><rect width="512" height="512" fill="#007bff"/><g fill="none" stroke="#fff" stroke-linecap="round" stroke-linejoin="round"><path d="M116 85 C 75 85, 70 120, 70 145 V 225 C 70 250, 50 256, 40 256 C 50 256, 70 262, 70 287 V 367 C 70 392, 75 427, 116 427" stroke-width="12"/><path d="M396 85 C 437 85, 442 120, 442 145 V 225 C 442 250, 462 256, 472 256 C 462 256, 442 262, 442 287 V 367 C 442 392, 437 427, 396 427" stroke-width="12"/><line x1="182" y1="190" x2="182" y2="300" stroke-width="10"/><line x1="330" y1="190" x2="330" y2="300" stroke-width="10"/><line x1="182" y1="190" x2="262" y2="256" stroke-width="10"/><line x1="330" y1="190" x2="250" y2="256" stroke-width="10"/></g><g fill="#fff"><circle cx="182" cy="190" r="41"/><circle cx="330" cy="190" r="41"/><path d="M182 256 A 41 41 0 1 0 182 338 C 182 338 182 380 148 412 L 140 420 C 160 420 200 390 223 300 A 41 41 0 0 0 182 256 Z"/><path d="M330 256 A 41 41 0 1 0 330 338 C 330 338 330 380 296 412 L 288 420 C 308 420 340 390 371 300 A 41 41 0 0 0 330 256 Z"/></g></svg></span><span class="brand-name">Modern Age Coders</span><span class="handle">word frequency</span></div>
  <div class="main"><div class="fit">
    <span class="eyebrow">the counting pattern, start to finish</span>
    <div class="flow">
      <div class="panel p1"><span class="hd">1. The sentence</span><div class="sent">"<span class="th">the</span> quick brown fox jumps over <span class="th">the</span> lazy dog <span class="th">the</span> end"</div></div>
      <span class="arw">-&gt;</span>
      <div class="panel p2"><span class="hd">2. split() it</span><div class="words"><span class="w th">the</span><span class="w">quick</span><span class="w">brown</span><span class="w">fox</span><span class="w">jumps</span><span class="w">over</span><span class="w th">the</span><span class="w">lazy</span><span class="w">dog</span><span class="w th">the</span><span class="w">end</span></div></div>
      <span class="arw">-&gt;</span>
      <div class="panel p3"><span class="hd">3. Count into a dict</span><div class="tally">
        <div class="trow hot"><span class="k2">"the"</span><span class="c2">3</span></div>
        <div class="trow"><span class="k2">"quick"</span><span class="c2">1</span></div>
        <div class="trow"><span class="k2">"fox"</span><span class="c2">1</span></div>
        <div class="trow"><span class="k2">...</span></div>
      </div></div>
    </div>
    <div class="code-line">counts[word] = counts.<span class="g">get</span>(word, 0) + 1</div>
  </div></div>
</div></body></html>
