<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../base.css"><style>
:root{--w:1200px;--h:675px;--blue:#2b6cb0}
.fit{gap:14px;align-items:center}
.lanes{display:flex;gap:60px;justify-content:center}
.lane{display:flex;flex-direction:column;align-items:center;gap:0}
.lane-title{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:22px;margin-bottom:10px}
.lane.ok .lane-title{color:var(--pine)} .lane.bad .lane-title{color:var(--coral)}
.step{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:22px;border:3px solid var(--ink);border-radius:12px;padding:9px 22px;background:var(--card);box-shadow:4px 5px 0 var(--ink)}
.step.try{background:#DCEBFA;color:var(--blue)}
.step.except{background:#FDECE6;color:var(--coral)}
.step.else{background:#DCF5E7;color:var(--pine)}
.step.fin{background:var(--yellow);color:var(--ink)}
.step.skip{background:#F7F1E2;color:#b9ae97;border-style:dashed;box-shadow:none}
.conn{width:3px;height:16px;background:var(--ink)}
.conn.dash{background:repeating-linear-gradient(var(--ink) 0 5px,transparent 5px 10px)}
.note{font-family:'Caveat',cursive;font-weight:700;font-size:34px;color:var(--coral)}
</style></head>
<body><div class="frame">
  <div class="brand-row"><span class="logo"><svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg"><rect width="512" height="512" fill="#007bff"/><g fill="none" stroke="#fff" stroke-linecap="round" stroke-linejoin="round"><path d="M116 85 C 75 85, 70 120, 70 145 V 225 C 70 250, 50 256, 40 256 C 50 256, 70 262, 70 287 V 367 C 70 392, 75 427, 116 427" stroke-width="12"/><path d="M396 85 C 437 85, 442 120, 442 145 V 225 C 442 250, 462 256, 472 256 C 462 256, 442 262, 442 287 V 367 C 442 392, 437 427, 396 427" stroke-width="12"/><line x1="182" y1="190" x2="182" y2="300" stroke-width="10"/><line x1="330" y1="190" x2="330" y2="300" stroke-width="10"/><line x1="182" y1="190" x2="262" y2="256" stroke-width="10"/><line x1="330" y1="190" x2="250" y2="256" stroke-width="10"/></g><g fill="#fff"><circle cx="182" cy="190" r="41"/><circle cx="330" cy="190" r="41"/><path d="M182 256 A 41 41 0 1 0 182 338 C 182 338 182 380 148 412 L 140 420 C 160 420 200 390 223 300 A 41 41 0 0 0 182 256 Z"/><path d="M330 256 A 41 41 0 1 0 330 338 C 330 338 330 380 296 412 L 288 420 C 308 420 340 390 371 300 A 41 41 0 0 0 330 256 Z"/></g></svg></span><span class="brand-name">Modern Age Coders</span><span class="handle">who runs when</span></div>
  <div class="main"><div class="fit">
    <span class="eyebrow">two roads through the same four blocks</span>
    <div class="lanes">
      <div class="lane ok">
        <span class="lane-title">no error</span>
        <span class="step try">try</span>
        <span class="conn"></span>
        <span class="step skip">except (skipped)</span>
        <span class="conn"></span>
        <span class="step else">else</span>
        <span class="conn"></span>
        <span class="step fin">finally</span>
      </div>
      <div class="lane bad">
        <span class="lane-title">error raised</span>
        <span class="step try">try</span>
        <span class="conn"></span>
        <span class="step except">except</span>
        <span class="conn"></span>
        <span class="step skip">else (skipped)</span>
        <span class="conn"></span>
        <span class="step fin">finally</span>
      </div>
    </div>
    <div class="note">finally runs on both roads. that is its whole job.</div>
  </div></div>
</div></body></html>
