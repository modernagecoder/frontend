<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-N8BM164YJP"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-N8BM164YJP');
      gtag('config', 'AW-16910316353');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{BLOG_TITLE}}</title>

    <!-- SEO Meta Tags -->
    <meta name="description" content="{{BLOG_DESCRIPTION}}">
    <!-- meta keywords intentionally not emitted: Google has ignored it since 2009 and Bing
         treats it as a SPAM SIGNAL — and Bing is the index ChatGPT/Copilot answer from.
         See scripts/strip-meta-keywords.py. -->
    <meta name="author" content="{{BLOG_AUTHOR_NAME}}">
    <link rel="canonical" href="https://learn.modernagecoders.com/blog/{{BLOG_SLUG}}">
    <link rel="alternate" type="text/markdown" href="https://learn.modernagecoders.com/content/blog/generated/{{BLOG_SLUG}}/index.md" title="Markdown version for AI agents" />
    <link rel="alternate" hreflang="en-in" href="https://learn.modernagecoders.com/blog/{{BLOG_SLUG}}" />
    <link rel="alternate" hreflang="en" href="https://learn.modernagecoders.com/blog/{{BLOG_SLUG}}" />
    <link rel="alternate" hreflang="x-default" href="https://learn.modernagecoders.com/blog/{{BLOG_SLUG}}" />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon/favicon.ico">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32x32.png">
    <link rel="apple-touch-icon" href="/favicon/favicon-32x32.png">

    <!-- Open Graph Meta Tags -->
    <meta property="og:type" content="article">
    <meta property="og:url" content="https://learn.modernagecoders.com/blog/{{BLOG_SLUG}}">
    <meta property="og:title" content="{{BLOG_TITLE}} - Modern Age Coders">
    <meta property="og:description" content="{{BLOG_DESCRIPTION}}">
    <meta property="og:image" content="{{HERO_IMAGE_URL}}">

    <!-- Twitter Card Meta Tags -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://learn.modernagecoders.com/blog/{{BLOG_SLUG}}"
       >
    <meta property="twitter:title" content="{{BLOG_TITLE}} - Modern Age Coders">
    <meta property="twitter:description" content="{{BLOG_DESCRIPTION}}">
    <meta property="twitter:image" content="{{HERO_IMAGE_URL}}">

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {{STRUCTURED_DATA}}
    </script>

    <!-- Fonts: Fraunces (display) · Inter (UI) · JetBrains Mono (code) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..700;1,9..144,400..600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap">
    <!-- Editorial theme (shared) + Blog styles. No legacy CSS. -->
    <link rel="stylesheet" href="/css/editorial-theme.css?v=20260626g">
    <link rel="stylesheet" href="/css/blog-redesign.css?v=20260713a">
    <meta name="theme-color" content="#B45309">
    <noscript><style>.section{opacity:1 !important;transform:none !important}</style></noscript>
    <script src="/js/ux-enhancements.js" defer></script>
    <script src="/js/hover-prefetch.js" defer></script>
    <script>if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('/sw.js').catch(function(){});});}</script>
</head>

<body class="blog-detail-page editorial">

    <canvas id="background-canvas"></canvas>

    <!-- ============================================ -->
    <!-- NAVIGATION COMPONENT                         -->
    <!-- Loaded from: /components/nav.html            -->
    <!-- ============================================ -->
    <div id="nav-placeholder"></div>

    <main>

        <!-- Hero Section -->
        <section class="blog-hero">
            <div class="blog-hero-content">
                <span class="blog-category">{{BLOG_CATEGORY}}</span>
                <h1 class="blog-hero-title">{{HERO_TITLE}}</h1>
                <p class="blog-hero-subtitle">{{HERO_SUBTITLE}}</p>
                <div class="blog-meta">
                    <div class="author-info">
                        <img src="{{BLOG_AUTHOR_AVATAR}}" alt="{{BLOG_AUTHOR_NAME}}" class="author-avatar">
                        <div class="author-details">
                            <span class="author-name">{{BLOG_AUTHOR_NAME}}</span>
                            <span class="blog-date">{{BLOG_DATE}}</span>
                        </div>
                    </div>
                    <span class="read-time">{{BLOG_READ_TIME}}</span>
                </div>
            </div>
            <div class="blog-hero-image">
                <img src="{{HERO_IMAGE_URL}}" alt="{{HERO_IMAGE_ALT}}" loading="lazy">
            </div>
        </section>

        <!-- Content Section -->
        <section class="blog-content-section">
            <article class="blog-content">
                {{BLOG_CONTENT}}
            </article>

            <!-- Author Bio Section -->
            <div class="author-bio-section">
                <img src="{{BLOG_AUTHOR_AVATAR}}" alt="{{BLOG_AUTHOR_NAME}}" class="author-bio-avatar" loading="lazy">
                <div class="author-bio-content">
                    <h3>About {{BLOG_AUTHOR_NAME}}</h3>
                    <p>{{BLOG_AUTHOR_BIO}}</p>
                </div>
            </div>

            <!-- Related Posts Section -->
            <div class="related-posts-section">
                <h2>Related Articles</h2>
                <div class="related-posts-grid">
                    {{RELATED_POSTS}}
                </div>
            </div>
        </section>

        <!-- Related Courses Section - Auto-generated for internal linking -->
        {{RELATED_COURSES}}

    </main>

    <!-- ============================================ -->
    <!-- FOOTER COMPONENT                             -->
    <!-- Loaded from: /components/footer.html         -->
    <!-- ============================================ -->
    <div id="footer-placeholder"></div>

    <!-- ============================================ -->
    <!-- CALLBACK MODAL SCRIPT - Must load first      -->
    <!-- ============================================ -->
    <script src="/js/callback-modal.js"></script>

    <!-- ============================================ -->
    <!-- COMPONENT LOADER SCRIPT                      -->
    <!-- Loads navigation and footer components       -->
    <!-- MUST BE LOADED BEFORE OTHER SCRIPTS          -->
    <!-- ============================================ -->
    <script src="/js/components-loader.js"></script>

    <!-- ============================================ -->
    <!-- MOBILE NAVIGATION SCRIPT                     -->
    <!-- Handles hamburger menu functionality         -->
    <!-- ============================================ -->
    <script src="/js/mobile-navigation.js"></script>

    <!-- Load Blog-specific JavaScript -->
    <script src="/js/navigation.js"></script>
    <script src="/js/blog-navigation.js"></script>
    <script src="/js/blog-interactive.js"></script>

    <!-- Load Mobile Navigation JavaScript -->
    <script src="/js/unified-mobile-nav.js"></script>

    <!-- Load Share Button JavaScript -->
    <script src="/js/share-button.js"></script>
    <script src="/js/country-code-selector.js?v=20260513c" defer></script>
</body>

</html>
