<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;9..144,800&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:800px;height:450px;overflow:hidden}
:root{
  --paper:#FBF8F2; --ink:#26211B; --muted:#877C6C;
  --accent:#0E7583; --accent-soft:#D3E7E5;
  --dot:rgba(38,33,27,.07); --hairline:rgba(38,33,27,.16);
}
body{font-family:'Inter',system-ui,sans-serif;background:var(--paper);color:var(--ink);position:relative}
body::before{content:"";position:absolute;inset:0;background-image:radial-gradient(var(--dot) 1.2px,transparent 1.2px);background-size:26px 26px}
.card{position:absolute;inset:0;padding:30px 40px 24px;display:flex;flex-direction:column}
.top{display:flex;justify-content:space-between;align-items:center;position:relative;z-index:2}
.wordmark{display:flex;align-items:center;gap:11px;font-size:13px;font-weight:800;letter-spacing:.22em}
.mark{width:17px;height:17px;position:relative;display:inline-block}
.mark b{position:absolute;left:5px;top:5px;width:15px;height:15px;border:2.5px solid var(--ink)}
.mark i{position:absolute;left:0;top:0;width:15px;height:15px;background:var(--accent)}
.badge{border:2.5px solid var(--ink);padding:8px 16px;border-radius:999px;font-weight:800;font-size:13px;letter-spacing:.12em}
.main{flex:1;display:flex;align-items:center;position:relative;z-index:1}
.titleblock{max-width:430px}
.kicker{font-size:12.5px;font-weight:800;letter-spacing:.3em;color:var(--accent);margin-bottom:15px}
h1{font-family:'Fraunces',Georgia,serif;font-weight:800;font-size:57px;line-height:1.04;letter-spacing:-.01em}
.sub{margin-top:15px;font-size:16px;line-height:1.45;color:var(--muted);font-weight:500;max-width:380px}
.bottom{display:flex;justify-content:space-between;align-items:center;border-top:1.5px solid var(--hairline);padding-top:13px;font-size:11px;letter-spacing:.12em;font-weight:700;color:var(--muted);position:relative;z-index:2}
.motif{position:absolute;right:34px;top:50%;transform:translateY(-50%);width:300px;height:260px}
.chip{position:absolute;right:2px;top:-4px;font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;background:var(--ink);color:var(--paper);padding:7px 11px;border-radius:8px;transform:rotate(2deg);box-shadow:3px 3px 0 rgba(38,33,27,.18)}
</style>
</head>
<body>
<div class="card">
  <div class="top">
    <div class="wordmark"><span class="mark"><b></b><i></i></span>MODERN AGE CODERS</div>
    <div class="badge">TEENS 14-18</div>
  </div>
  <div class="main">
    <div class="titleblock">
      <div class="kicker">PYTHON DATA COURSE</div>
      <h1>Data Science<br>for Teens</h1>
      <p class="sub">Python, real datasets and honest analysis</p>
    </div>
  </div>
  <div class="motif">
    <div class="chip">df.plot()</div>
    <svg width="300" height="240" viewBox="0 0 300 240" fill="none" style="position:absolute;left:0;top:28px">
      <line x1="30" y1="18" x2="30" y2="204" stroke="#26211B" stroke-width="3"/>
      <line x1="30" y1="204" x2="288" y2="204" stroke="#26211B" stroke-width="3"/>
      <line x1="30" y1="140" x2="288" y2="140" stroke="#26211B" stroke-width="1.5" stroke-dasharray="4 7" opacity=".35"/>
      <line x1="30" y1="76" x2="288" y2="76" stroke="#26211B" stroke-width="1.5" stroke-dasharray="4 7" opacity=".35"/>
      <rect x="52" y="146" width="36" height="58" fill="#BFDBD7" stroke="#26211B" stroke-width="2.5"/>
      <rect x="110" y="112" width="36" height="92" fill="#BFDBD7" stroke="#26211B" stroke-width="2.5"/>
      <rect x="168" y="128" width="36" height="76" fill="#BFDBD7" stroke="#26211B" stroke-width="2.5"/>
      <rect x="226" y="70" width="36" height="134" fill="#BFDBD7" stroke="#26211B" stroke-width="2.5"/>
      <polyline points="70,132 128,96 186,108 244,42" stroke="#0E7583" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="70" cy="132" r="6" fill="#0E7583" stroke="#FBF8F2" stroke-width="2.5"/>
      <circle cx="128" cy="96" r="6" fill="#0E7583" stroke="#FBF8F2" stroke-width="2.5"/>
      <circle cx="186" cy="108" r="6" fill="#0E7583" stroke="#FBF8F2" stroke-width="2.5"/>
      <circle cx="244" cy="42" r="6" fill="#0E7583" stroke="#FBF8F2" stroke-width="2.5"/>
    </svg>
  </div>
  <div class="bottom"><span>LIVE ONLINE CLASSES</span><span>learn.modernagecoders.com</span></div>
</div>
</body>
</html>
