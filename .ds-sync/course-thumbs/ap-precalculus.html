<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;9..144,800&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:800px;height:450px;overflow:hidden}
:root{
  --paper:#211D18; --ink:#F3EDE0; --muted:#A79C89;
  --accent:#E8A33D; --accent-soft:rgba(232,163,61,.16);
  --dot:rgba(243,237,224,.06); --hairline:rgba(243,237,224,.22);
}
body{font-family:'Inter',system-ui,sans-serif;background:var(--paper);color:var(--ink);position:relative}
body::before{content:"";position:absolute;inset:0;background-image:radial-gradient(var(--dot) 1.2px,transparent 1.2px);background-size:26px 26px}
.card{position:absolute;inset:0;padding:30px 40px 24px;display:flex;flex-direction:column}
.top{display:flex;justify-content:space-between;align-items:center;position:relative;z-index:2}
.wordmark{display:flex;align-items:center;gap:11px;font-size:13px;font-weight:800;letter-spacing:.22em}
.mark{width:17px;height:17px;position:relative;display:inline-block}
.mark b{position:absolute;left:5px;top:5px;width:15px;height:15px;border:2.5px solid var(--ink)}
.mark i{position:absolute;left:0;top:0;width:15px;height:15px;background:var(--accent)}
.badge{border:2.5px solid var(--ink);padding:8px 16px;border-radius:999px;font-weight:800;font-size:13px;letter-spacing:.12em}
.main{flex:1;display:flex;align-items:center;position:relative;z-index:1}
.titleblock{max-width:370px}
.kicker{font-size:12.5px;font-weight:800;letter-spacing:.3em;color:var(--accent);margin-bottom:15px}
h1{font-family:'Fraunces',Georgia,serif;font-weight:800;font-size:49px;line-height:1.05;letter-spacing:-.01em}
.sub{margin-top:15px;font-size:15.5px;line-height:1.45;color:var(--muted);font-weight:500;max-width:340px}
.bottom{display:flex;justify-content:space-between;align-items:center;border-top:1.5px solid var(--hairline);padding-top:13px;font-size:11px;letter-spacing:.12em;font-weight:700;color:var(--muted);position:relative;z-index:2}
.motif{position:absolute;right:34px;top:50%;transform:translateY(-50%);width:308px;height:250px}
.panel{position:absolute;right:0;top:20px;width:306px;height:210px;background:#2B251D;border:2px solid rgba(243,237,224,.28);border-radius:14px;box-shadow:0 14px 34px rgba(0,0,0,.35);padding:15px 18px}
.plabel{font-family:'JetBrains Mono',monospace;font-size:11.5px;letter-spacing:.1em;color:var(--muted);margin-bottom:6px}
</style>
</head>
<body>
<div class="card">
  <div class="top">
    <div class="wordmark"><span class="mark"><b></b><i></i></span>MODERN AGE CODERS</div>
    <div class="badge">AP EXAM</div>
  </div>
  <div class="main">
    <div class="titleblock">
      <div class="kicker">MATHEMATICS</div>
      <h1>AP<br>Precalculus</h1>
      <p class="sub">Units 1 to 3, functions to trig, and the exam</p>
    </div>
  </div>
  <div class="motif">
    <div class="panel">
      <div class="plabel">f(x)</div>
      <svg viewBox="0 0 270 156" width="270" height="156">
        <g stroke="rgba(243,237,224,.12)" stroke-width="1">
          <line x1="6" y1="40" x2="264" y2="40"/>
          <line x1="6" y1="118" x2="264" y2="118"/>
          <line x1="70" y1="8" x2="70" y2="150"/>
          <line x1="200" y1="8" x2="200" y2="150"/>
        </g>
        <line x1="6" y1="79" x2="264" y2="79" stroke="rgba(243,237,224,.34)" stroke-width="1.5"/>
        <line x1="135" y1="8" x2="135" y2="150" stroke="rgba(243,237,224,.34)" stroke-width="1.5"/>
        <path d="M78,44 Q135,150 192,44" fill="none" stroke="rgba(167,156,137,.85)" stroke-width="2.4"/>
        <path d="M10,79 C34,79 49,43 71,43 C93,43 108,79 135,79 C160,79 175,115 197,115 C219,115 235,79 260,79" fill="none" stroke="#E8A33D" stroke-width="3.2" stroke-linecap="round"/>
      </svg>
    </div>
  </div>
  <div class="bottom"><span>LIVE ONLINE CLASSES</span><span>learn.modernagecoders.com</span></div>
</div>
</body>
</html>
