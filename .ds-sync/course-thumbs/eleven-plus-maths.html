<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;9..144,800&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:800px;height:450px;overflow:hidden}
:root{
  --paper:#FBF8F2; --ink:#26211B; --muted:#877C6C;
  --accent:#1E6E54; --accent-soft:#D8E8DF;
  --dot:rgba(38,33,27,.07); --hairline:rgba(38,33,27,.16);
}
body{font-family:'Inter',system-ui,sans-serif;background:var(--paper);color:var(--ink);position:relative}
body::before{content:"";position:absolute;inset:0;background-image:radial-gradient(var(--dot) 1.2px,transparent 1.2px);background-size:26px 26px}
.card{position:absolute;inset:0;padding:30px 40px 24px;display:flex;flex-direction:column}
.top{display:flex;justify-content:space-between;align-items:center;position:relative;z-index:2}
.wordmark{display:flex;align-items:center;gap:11px;font-size:13px;font-weight:800;letter-spacing:.22em}
.mark{width:17px;height:17px;position:relative;display:inline-block}
.mark b{position:absolute;left:5px;top:5px;width:15px;height:15px;border:2.5px solid var(--ink)}
.mark i{position:absolute;left:0;top:0;width:15px;height:15px;background:var(--accent)}
.badge{border:2.5px solid var(--ink);padding:8px 16px;border-radius:999px;font-weight:800;font-size:13px;letter-spacing:.12em}
.main{flex:1;display:flex;align-items:center;position:relative;z-index:1}
.titleblock{max-width:430px}
.kicker{font-size:12.5px;font-weight:800;letter-spacing:.3em;color:var(--accent);margin-bottom:15px}
h1{font-family:'Fraunces',Georgia,serif;font-weight:800;font-size:54px;line-height:1.06;letter-spacing:-.01em}
.sub{margin-top:15px;font-size:16px;line-height:1.45;color:var(--muted);font-weight:500;max-width:380px}
.bottom{display:flex;justify-content:space-between;align-items:center;border-top:1.5px solid var(--hairline);padding-top:13px;font-size:11px;letter-spacing:.12em;font-weight:700;color:var(--muted);position:relative;z-index:2}
.motif{position:absolute;right:36px;top:50%;transform:translateY(-50%);width:300px;height:266px}
.sheet{position:absolute;right:6px;top:14px;width:276px;height:236px;background:#FFFFFF;border:2.5px solid var(--ink);border-radius:12px;transform:rotate(1.5deg);box-shadow:6px 6px 0 rgba(38,33,27,.12);padding:16px 18px;font-family:'JetBrains Mono',monospace}
.qline{font-size:13.5px;font-weight:700;color:var(--muted);letter-spacing:.06em;margin-bottom:10px}
.opts{display:flex;flex-direction:column;gap:9px;margin-top:12px}
.opt{display:flex;align-items:center;gap:11px;font-size:15px;font-weight:500;color:var(--ink)}
.box{width:24px;height:24px;border:2.5px solid var(--ink);border-radius:6px;position:relative;flex:none}
.box.t{background:var(--accent);border-color:var(--accent)}
</style>
</head>
<body>
<div class="card">
  <div class="top">
    <div class="wordmark"><span class="mark"><b></b><i></i></span>MODERN AGE CODERS</div>
    <div class="badge">AGES 9-11</div>
  </div>
  <div class="main">
    <div class="titleblock">
      <div class="kicker">UK EXAM PREP COURSE</div>
      <h1>11 Plus Maths<br>Preparation</h1>
      <p class="sub">Grammar school entrance maths, step by step</p>
    </div>
  </div>
  <div class="motif">
    <div class="sheet">
      <div class="qline">Q7. WHICH SHAPE COMES NEXT?</div>
      <svg width="238" height="52" viewBox="0 0 238 52" fill="none">
        <rect x="4" y="8" width="38" height="38" fill="none" stroke="#26211B" stroke-width="3"/>
        <polygon points="86,8 105,46 67,46" fill="none" stroke="#26211B" stroke-width="3" stroke-linejoin="round"/>
        <polygon points="148,8 166,21 159,43 137,43 130,21" fill="none" stroke="#26211B" stroke-width="3" stroke-linejoin="round"/>
        <rect x="192" y="8" width="38" height="38" fill="#D8E8DF" stroke="#1E6E54" stroke-width="3" stroke-dasharray="6 5"/>
        <text x="205" y="36" font-family="Fraunces,Georgia,serif" font-size="24" font-weight="800" fill="#1E6E54">?</text>
      </svg>
      <div class="opts">
        <div class="opt"><span class="box"></span>A. Square</div>
        <div class="opt"><span class="box t">
          <svg width="24" height="24" viewBox="0 0 24 24" style="position:absolute;left:-2.5px;top:-2.5px"><polyline points="5,12 10,17 19,7" stroke="#FBF8F2" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </span>B. Hexagon</div>
        <div class="opt"><span class="box"></span>C. Circle</div>
      </div>
    </div>
  </div>
  <div class="bottom"><span>LIVE ONLINE CLASSES</span><span>learn.modernagecoders.com</span></div>
</div>
</body>
</html>
