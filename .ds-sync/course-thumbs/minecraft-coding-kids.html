<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;9..144,800&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:800px;height:450px;overflow:hidden}
:root{
  --paper:#FBF8F2; --ink:#26211B; --muted:#877C6C;
  --accent:#5A8A34; --accent-soft:#DFEAD0;
  --dot:rgba(38,33,27,.07); --hairline:rgba(38,33,27,.16);
}
body{font-family:'Inter',system-ui,sans-serif;background:var(--paper);color:var(--ink);position:relative}
body::before{content:"";position:absolute;inset:0;background-image:radial-gradient(var(--dot) 1.2px,transparent 1.2px);background-size:26px 26px}
.card{position:absolute;inset:0;padding:30px 40px 24px;display:flex;flex-direction:column}
.top{display:flex;justify-content:space-between;align-items:center;position:relative;z-index:2}
.wordmark{display:flex;align-items:center;gap:11px;font-size:13px;font-weight:800;letter-spacing:.22em}
.mark{width:17px;height:17px;position:relative;display:inline-block}
.mark b{position:absolute;left:5px;top:5px;width:15px;height:15px;border:2.5px solid var(--ink)}
.mark i{position:absolute;left:0;top:0;width:15px;height:15px;background:var(--accent)}
.badge{border:2.5px solid var(--ink);padding:8px 16px;border-radius:999px;font-weight:800;font-size:13px;letter-spacing:.12em;background:var(--accent);color:#FBF8F2}
.main{flex:1;display:flex;align-items:center;position:relative;z-index:1}
.titleblock{max-width:440px}
.kicker{font-size:12.5px;font-weight:800;letter-spacing:.3em;color:var(--accent);margin-bottom:15px}
h1{font-family:'Fraunces',Georgia,serif;font-weight:800;font-size:58px;line-height:1.04;letter-spacing:-.01em}
.sub{margin-top:15px;font-size:16px;line-height:1.45;color:var(--muted);font-weight:500;max-width:380px}
.bottom{display:flex;justify-content:space-between;align-items:center;border-top:1.5px solid var(--hairline);padding-top:13px;font-size:11px;letter-spacing:.12em;font-weight:700;color:var(--muted);position:relative;z-index:2}
.motif{position:absolute;right:30px;top:50%;transform:translateY(-50%);width:310px;height:270px}
.px{position:absolute;width:13px;height:13px;background:var(--accent-soft);border:2px solid var(--accent)}
.px1{left:10px;top:20px;transform:rotate(8deg)}
.px2{right:16px;top:44px;transform:rotate(-6deg)}
.px3{left:34px;bottom:64px;transform:rotate(-10deg)}
.chip{position:absolute;left:50%;transform:translateX(-50%) rotate(-1.5deg);bottom:6px;font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700;background:var(--ink);color:var(--paper);padding:9px 13px;border-radius:9px;white-space:nowrap;box-shadow:3px 3px 0 rgba(38,33,27,.18)}
</style>
</head>
<body>
<div class="card">
  <div class="top">
    <div class="wordmark"><span class="mark"><b></b><i></i></span>MODERN AGE CODERS</div>
    <div class="badge">KIDS 7-12</div>
  </div>
  <div class="main">
    <div class="titleblock">
      <div class="kicker">GAME CODING COURSE</div>
      <h1>Minecraft<br>Coding</h1>
      <p class="sub">From code blocks to real programs</p>
    </div>
  </div>
  <div class="motif">
    <span class="px px1"></span><span class="px px2"></span><span class="px px3"></span>
    <svg width="310" height="220" viewBox="0 0 310 220" fill="none" style="position:absolute;left:0;top:8px">
      <!-- back grass cube -->
      <g>
        <polygon points="155,14 199,36 155,58 111,36" fill="#7CB14E" stroke="#26211B" stroke-width="3" stroke-linejoin="round"/>
        <polygon points="111,36 155,58 155,106 111,84" fill="#5A8A34" stroke="#26211B" stroke-width="3" stroke-linejoin="round"/>
        <polygon points="199,36 155,58 155,106 199,84" fill="#48702A" stroke="#26211B" stroke-width="3" stroke-linejoin="round"/>
      </g>
      <!-- left dirt cube -->
      <g>
        <polygon points="111,62 155,84 111,106 67,84" fill="#A9713F" stroke="#26211B" stroke-width="3" stroke-linejoin="round"/>
        <polygon points="67,84 111,106 111,154 67,132" fill="#8A5A33" stroke="#26211B" stroke-width="3" stroke-linejoin="round"/>
        <polygon points="155,84 111,106 111,154 155,132" fill="#6E4426" stroke="#26211B" stroke-width="3" stroke-linejoin="round"/>
      </g>
      <!-- right grass cube -->
      <g>
        <polygon points="199,62 243,84 199,106 155,84" fill="#7CB14E" stroke="#26211B" stroke-width="3" stroke-linejoin="round"/>
        <polygon points="155,84 199,106 199,154 155,132" fill="#5A8A34" stroke="#26211B" stroke-width="3" stroke-linejoin="round"/>
        <polygon points="243,84 199,106 199,154 243,132" fill="#48702A" stroke="#26211B" stroke-width="3" stroke-linejoin="round"/>
      </g>
      <!-- front dirt cube -->
      <g>
        <polygon points="155,110 199,132 155,154 111,132" fill="#A9713F" stroke="#26211B" stroke-width="3" stroke-linejoin="round"/>
        <polygon points="111,132 155,154 155,202 111,180" fill="#8A5A33" stroke="#26211B" stroke-width="3" stroke-linejoin="round"/>
        <polygon points="199,132 155,154 155,202 199,180" fill="#6E4426" stroke="#26211B" stroke-width="3" stroke-linejoin="round"/>
      </g>
    </svg>
    <div class="chip">when block placed</div>
  </div>
  <div class="bottom"><span>LIVE ONLINE CLASSES</span><span>learn.modernagecoders.com</span></div>
</div>
</body>
</html>
