<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;9..144,800&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:800px;height:450px;overflow:hidden}
:root{
  --paper:#FBF8F2; --ink:#26211B; --muted:#877C6C;
  --accent:#B4700F; --accent-soft:#F3E2C4;
  --dot:rgba(38,33,27,.07); --hairline:rgba(38,33,27,.16);
}
body{font-family:'Inter',system-ui,sans-serif;background:var(--paper);color:var(--ink);position:relative}
body::before{content:"";position:absolute;inset:0;background-image:radial-gradient(var(--dot) 1.2px,transparent 1.2px);background-size:26px 26px}
.card{position:absolute;inset:0;padding:30px 40px 24px;display:flex;flex-direction:column}
.top{display:flex;justify-content:space-between;align-items:center;position:relative;z-index:2}
.wordmark{display:flex;align-items:center;gap:11px;font-size:13px;font-weight:800;letter-spacing:.22em}
.mark{width:17px;height:17px;position:relative;display:inline-block}
.mark b{position:absolute;left:5px;top:5px;width:15px;height:15px;border:2.5px solid var(--ink)}
.mark i{position:absolute;left:0;top:0;width:15px;height:15px;background:var(--accent)}
.badge{border:2.5px solid var(--ink);padding:8px 16px;border-radius:999px;font-weight:800;font-size:13px;letter-spacing:.12em}
.main{flex:1;display:flex;align-items:center;position:relative;z-index:1}
.titleblock{max-width:430px}
.kicker{font-size:12.5px;font-weight:800;letter-spacing:.3em;color:var(--accent);margin-bottom:15px}
h1{font-family:'Fraunces',Georgia,serif;font-weight:800;font-size:58px;line-height:1.04;letter-spacing:-.01em}
.sub{margin-top:15px;font-size:16px;line-height:1.45;color:var(--muted);font-weight:500;max-width:380px}
.bottom{display:flex;justify-content:space-between;align-items:center;border-top:1.5px solid var(--hairline);padding-top:13px;font-size:11px;letter-spacing:.12em;font-weight:700;color:var(--muted);position:relative;z-index:2}
.motif{position:absolute;right:44px;top:50%;transform:translateY(-50%);width:280px;height:270px;font-family:'Fraunces',Georgia,serif}
.ans{position:absolute;left:50%;transform:translateX(-50%);bottom:0;font-size:30px;font-weight:800;color:var(--accent);white-space:nowrap}
</style>
</head>
<body>
<div class="card">
  <div class="top">
    <div class="wordmark"><span class="mark"><b></b><i></i></span>MODERN AGE CODERS</div>
    <div class="badge">AGES 8+</div>
  </div>
  <div class="main">
    <div class="titleblock">
      <div class="kicker">SPEED MATHS COURSE</div>
      <h1>Vedic Maths<br>Mastery</h1>
      <p class="sub">Calculate faster with classical speed techniques</p>
    </div>
  </div>
  <div class="motif">
    <svg width="280" height="230" viewBox="0 0 280 230" fill="none" style="position:absolute;left:0;top:0">
      <!-- lattice grid 2x2, cells 76px, origin (64,44) -->
      <rect x="64" y="44" width="152" height="152" fill="#FFFFFF" stroke="#26211B" stroke-width="3.5"/>
      <line x1="140" y1="44" x2="140" y2="196" stroke="#26211B" stroke-width="3"/>
      <line x1="64" y1="120" x2="216" y2="120" stroke="#26211B" stroke-width="3"/>
      <!-- diagonals -->
      <line x1="64" y1="120" x2="140" y2="44" stroke="#B4700F" stroke-width="2.5"/>
      <line x1="64" y1="196" x2="216" y2="44" stroke="#B4700F" stroke-width="2.5"/>
      <line x1="140" y1="196" x2="216" y2="120" stroke="#B4700F" stroke-width="2.5"/>
      <!-- top digits 2 3 -->
      <text x="102" y="32" font-family="Fraunces,Georgia,serif" font-size="30" font-weight="800" fill="#26211B" text-anchor="middle">2</text>
      <text x="178" y="32" font-family="Fraunces,Georgia,serif" font-size="30" font-weight="800" fill="#26211B" text-anchor="middle">3</text>
      <!-- right digits 4 7 -->
      <text x="238" y="92" font-family="Fraunces,Georgia,serif" font-size="30" font-weight="800" fill="#26211B" text-anchor="middle">4</text>
      <text x="238" y="168" font-family="Fraunces,Georgia,serif" font-size="30" font-weight="800" fill="#26211B" text-anchor="middle">7</text>
      <!-- cell digits: 2x4=08, 3x4=12, 2x7=14, 3x7=21 -->
      <text x="88" y="78" font-size="21" font-weight="700" fill="#877C6C" font-family="Fraunces,Georgia,serif" text-anchor="middle">0</text>
      <text x="122" y="108" font-size="21" font-weight="700" fill="#26211B" font-family="Fraunces,Georgia,serif" text-anchor="middle">8</text>
      <text x="164" y="78" font-size="21" font-weight="700" fill="#877C6C" font-family="Fraunces,Georgia,serif" text-anchor="middle">1</text>
      <text x="198" y="108" font-size="21" font-weight="700" fill="#26211B" font-family="Fraunces,Georgia,serif" text-anchor="middle">2</text>
      <text x="88" y="154" font-size="21" font-weight="700" fill="#877C6C" font-family="Fraunces,Georgia,serif" text-anchor="middle">1</text>
      <text x="122" y="184" font-size="21" font-weight="700" fill="#26211B" font-family="Fraunces,Georgia,serif" text-anchor="middle">4</text>
      <text x="164" y="154" font-size="21" font-weight="700" fill="#877C6C" font-family="Fraunces,Georgia,serif" text-anchor="middle">2</text>
      <text x="198" y="184" font-size="21" font-weight="700" fill="#26211B" font-family="Fraunces,Georgia,serif" text-anchor="middle">1</text>
    </svg>
    <div class="ans">23 &#215; 47 = 1081</div>
  </div>
  <div class="bottom"><span>LIVE ONLINE CLASSES</span><span>learn.modernagecoders.com</span></div>
</div>
</body>
</html>
