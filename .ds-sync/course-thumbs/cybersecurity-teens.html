<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;9..144,800&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:800px;height:450px;overflow:hidden}
:root{
  --paper:#FBF8F2; --ink:#26211B; --muted:#877C6C;
  --accent:#1E6E54; --accent-soft:#D8E8DF;
  --dot:rgba(38,33,27,.07); --hairline:rgba(38,33,27,.16);
}
body{font-family:'Inter',system-ui,sans-serif;background:var(--paper);color:var(--ink);position:relative}
body::before{content:"";position:absolute;inset:0;background-image:radial-gradient(var(--dot) 1.2px,transparent 1.2px);background-size:26px 26px}
.card{position:absolute;inset:0;padding:30px 40px 24px;display:flex;flex-direction:column}
.top{display:flex;justify-content:space-between;align-items:center;position:relative;z-index:2}
.wordmark{display:flex;align-items:center;gap:11px;font-size:13px;font-weight:800;letter-spacing:.22em}
.mark{width:17px;height:17px;position:relative;display:inline-block}
.mark b{position:absolute;left:5px;top:5px;width:15px;height:15px;border:2.5px solid var(--ink)}
.mark i{position:absolute;left:0;top:0;width:15px;height:15px;background:var(--accent)}
.badge{border:2.5px solid var(--ink);padding:8px 16px;border-radius:999px;font-weight:800;font-size:13px;letter-spacing:.12em}
.main{flex:1;display:flex;align-items:center;position:relative;z-index:1}
.titleblock{max-width:430px}
.kicker{font-size:12.5px;font-weight:800;letter-spacing:.3em;color:var(--accent);margin-bottom:15px}
h1{font-family:'Fraunces',Georgia,serif;font-weight:800;font-size:54px;line-height:1.06;letter-spacing:-.01em}
.sub{margin-top:15px;font-size:16px;line-height:1.45;color:var(--muted);font-weight:500;max-width:380px}
.bottom{display:flex;justify-content:space-between;align-items:center;border-top:1.5px solid var(--hairline);padding-top:13px;font-size:11px;letter-spacing:.12em;font-weight:700;color:var(--muted);position:relative;z-index:2}
.motif{position:absolute;right:40px;top:50%;transform:translateY(-50%);width:290px;height:270px}
.chip{position:absolute;font-family:'JetBrains Mono',monospace;font-size:14.5px;font-weight:700;background:var(--ink);color:var(--paper);padding:7px 11px;border-radius:8px;box-shadow:3px 3px 0 rgba(38,33,27,.18)}
.ch1{left:-6px;top:6px;transform:rotate(-4deg)}
.ch2{right:-2px;bottom:12px;transform:rotate(3deg);background:var(--accent)}
</style>
</head>
<body>
<div class="card">
  <div class="top">
    <div class="wordmark"><span class="mark"><b></b><i></i></span>MODERN AGE CODERS</div>
    <div class="badge">TEENS 13-18</div>
  </div>
  <div class="main">
    <div class="titleblock">
      <div class="kicker">DEFENSIVE SECURITY COURSE</div>
      <h1>Cybersecurity<br>for Teens</h1>
      <p class="sub">Online safety, defensive skills and white hat ethics</p>
    </div>
  </div>
  <div class="motif">
    <svg width="290" height="270" viewBox="0 0 290 270" fill="none" style="position:absolute;inset:0">
      <circle cx="148" cy="134" r="122" stroke="#26211B" stroke-width="2" stroke-dasharray="3 9" opacity=".45"/>
      <path d="M148 30 L232 60 V138 C232 196 148 234 148 234 C148 234 64 196 64 138 V60 Z" fill="#FFFFFF" stroke="#26211B" stroke-width="5" stroke-linejoin="round"/>
      <path d="M148 48 L216 72 V136 C216 182 148 214 148 214 C148 214 80 182 80 136 V72 Z" fill="var(--accent-soft)" stroke="#26211B" stroke-width="2.5" stroke-dasharray="5 6" stroke-linejoin="round"/>
      <circle cx="148" cy="118" r="22" fill="#1E6E54" stroke="#26211B" stroke-width="3"/>
      <path d="M141 134 L136 172 H160 L155 134 Z" fill="#1E6E54" stroke="#26211B" stroke-width="3" stroke-linejoin="round"/>
      <line x1="20" y1="134" x2="42" y2="134" stroke="#26211B" stroke-width="3"/>
      <line x1="254" y1="134" x2="276" y2="134" stroke="#26211B" stroke-width="3"/>
    </svg>
    <div class="chip ch1">https://</div>
    <div class="chip ch2">access: granted</div>
  </div>
  <div class="bottom"><span>LIVE ONLINE CLASSES</span><span>learn.modernagecoders.com</span></div>
</div>
</body>
</html>
