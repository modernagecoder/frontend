<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700;0,9..144,800;1,9..144,600&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:800px;height:450px;overflow:hidden}
:root{
  --paper:#FBF8F2; --ink:#26211B; --muted:#877C6C;
  --accent:#1E6E54; --accent-soft:#D8E8DF;
  --dot:rgba(38,33,27,.07); --hairline:rgba(38,33,27,.16);
}
body{font-family:'Inter',system-ui,sans-serif;background:var(--paper);color:var(--ink);position:relative}
body::before{content:"";position:absolute;inset:0;background-image:radial-gradient(var(--dot) 1.2px,transparent 1.2px);background-size:26px 26px}
.card{position:absolute;inset:0;padding:30px 40px 24px;display:flex;flex-direction:column}
.top{display:flex;justify-content:space-between;align-items:center;position:relative;z-index:2}
.wordmark{display:flex;align-items:center;gap:11px;font-size:13px;font-weight:800;letter-spacing:.22em}
.mark{width:17px;height:17px;position:relative;display:inline-block}
.mark b{position:absolute;left:5px;top:5px;width:15px;height:15px;border:2.5px solid var(--ink)}
.mark i{position:absolute;left:0;top:0;width:15px;height:15px;background:var(--accent)}
.badge{border:2.5px solid var(--ink);padding:8px 16px;border-radius:999px;font-weight:800;font-size:13px;letter-spacing:.12em}
.main{flex:1;display:flex;align-items:center;position:relative;z-index:1}
.titleblock{max-width:430px}
.kicker{font-size:12.5px;font-weight:800;letter-spacing:.3em;color:var(--accent);margin-bottom:15px}
h1{font-family:'Fraunces',Georgia,serif;font-weight:800;font-size:60px;line-height:1.04;letter-spacing:-.01em}
.sub{margin-top:15px;font-size:16px;line-height:1.45;color:var(--muted);font-weight:500;max-width:380px}
.bottom{display:flex;justify-content:space-between;align-items:center;border-top:1.5px solid var(--hairline);padding-top:13px;font-size:11px;letter-spacing:.12em;font-weight:700;color:var(--muted);position:relative;z-index:2}
.motif{position:absolute;right:36px;top:50%;transform:translateY(-50%);width:300px;height:270px}
.chips{position:absolute;left:50%;transform:translateX(-50%);bottom:0;display:flex;gap:10px;white-space:nowrap}
.chp{font-family:'JetBrains Mono',monospace;font-size:13.5px;font-weight:700;border:2px solid var(--ink);border-radius:999px;padding:7px 13px;background:#fff}
.chp.f{background:var(--accent);border-color:var(--accent);color:#FBF8F2}
</style>
</head>
<body>
<div class="card">
  <div class="top">
    <div class="wordmark"><span class="mark"><b></b><i></i></span>MODERN AGE CODERS</div>
    <div class="badge">A-LEVEL</div>
  </div>
  <div class="main">
    <div class="titleblock">
      <div class="kicker">MATHS COURSE</div>
      <h1>A-Level<br>Maths</h1>
      <p class="sub">Pure, Mechanics and Statistics, taught properly</p>
    </div>
  </div>
  <div class="motif">
    <svg width="300" height="212" viewBox="0 0 300 212" fill="none" style="position:absolute;left:0;top:0">
      <!-- axes -->
      <line x1="30" y1="8" x2="30" y2="186" stroke="#26211B" stroke-width="3"/>
      <line x1="16" y1="172" x2="292" y2="172" stroke="#26211B" stroke-width="3"/>
      <!-- shaded integral area under curve between a and b -->
      <path d="M96 128 C130 66 176 60 216 96 L216 172 L96 172 Z" fill="#D8E8DF" stroke="none"/>
      <!-- curve -->
      <path d="M40 158 C80 132 120 52 168 62 C210 71 244 118 284 96" stroke="#1E6E54" stroke-width="4.5" fill="none" stroke-linecap="round"/>
      <!-- bounds -->
      <line x1="96" y1="128" x2="96" y2="172" stroke="#26211B" stroke-width="2.5" stroke-dasharray="5 5"/>
      <line x1="216" y1="96" x2="216" y2="172" stroke="#26211B" stroke-width="2.5" stroke-dasharray="5 5"/>
      <text x="90" y="196" font-family="Fraunces,Georgia,serif" font-style="italic" font-size="19" font-weight="700" fill="#26211B">a</text>
      <text x="211" y="196" font-family="Fraunces,Georgia,serif" font-style="italic" font-size="19" font-weight="700" fill="#26211B">b</text>
      <!-- integral label -->
      <text x="128" y="146" font-family="Fraunces,Georgia,serif" font-style="italic" font-size="24" font-weight="700" fill="#1E6E54">&#8747; f(x) dx</text>
      <!-- mechanics vector -->
      <line x1="240" y1="42" x2="284" y2="20" stroke="#26211B" stroke-width="3"/>
      <polygon points="290,17 276,20 282,31" fill="#26211B"/>
    </svg>
    <div class="chips"><span class="chp f">Pure</span><span class="chp">Mechanics</span><span class="chp">Statistics</span></div>
  </div>
  <div class="bottom"><span>LIVE ONLINE CLASSES</span><span>learn.modernagecoders.com</span></div>
</div>
</body>
</html>
