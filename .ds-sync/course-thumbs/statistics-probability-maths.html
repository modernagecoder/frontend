<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700;0,9..144,800;1,9..144,600&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:800px;height:450px;overflow:hidden}
:root{
  --paper:#211D18; --ink:#F3EDE0; --muted:#A79C89;
  --accent:#E8A33D; --accent-soft:rgba(232,163,61,.2);
  --dot:rgba(243,237,224,.06); --hairline:rgba(243,237,224,.22);
}
body{font-family:'Inter',system-ui,sans-serif;background:var(--paper);color:var(--ink);position:relative}
body::before{content:"";position:absolute;inset:0;background-image:radial-gradient(var(--dot) 1.2px,transparent 1.2px);background-size:26px 26px}
.card{position:absolute;inset:0;padding:30px 40px 24px;display:flex;flex-direction:column}
.top{display:flex;justify-content:space-between;align-items:center;position:relative;z-index:2}
.wordmark{display:flex;align-items:center;gap:11px;font-size:13px;font-weight:800;letter-spacing:.22em}
.mark{width:17px;height:17px;position:relative;display:inline-block}
.mark b{position:absolute;left:5px;top:5px;width:15px;height:15px;border:2.5px solid var(--ink)}
.mark i{position:absolute;left:0;top:0;width:15px;height:15px;background:var(--accent)}
.badge{border:2.5px solid var(--ink);padding:8px 16px;border-radius:999px;font-weight:800;font-size:13px;letter-spacing:.12em}
.main{flex:1;display:flex;align-items:center;position:relative;z-index:1}
.titleblock{max-width:440px}
.kicker{font-size:12.5px;font-weight:800;letter-spacing:.3em;color:var(--accent);margin-bottom:15px}
h1{font-family:'Fraunces',Georgia,serif;font-weight:800;font-size:56px;line-height:1.04;letter-spacing:-.01em}
.sub{margin-top:15px;font-size:16px;line-height:1.45;color:var(--muted);font-weight:500;max-width:390px}
.bottom{display:flex;justify-content:space-between;align-items:center;border-top:1.5px solid var(--hairline);padding-top:13px;font-size:11px;letter-spacing:.12em;font-weight:700;color:var(--muted);position:relative;z-index:2}
.motif{position:absolute;right:34px;top:50%;transform:translateY(-50%);width:300px;height:250px}
</style>
</head>
<body>
<div class="card">
  <div class="top">
    <div class="wordmark"><span class="mark"><b></b><i></i></span>MODERN AGE CODERS</div>
    <div class="badge">COLLEGE</div>
  </div>
  <div class="main">
    <div class="titleblock">
      <div class="kicker">MATHS COURSE</div>
      <h1>Statistics &amp;<br>Probability</h1>
      <p class="sub">From descriptive stats to real inference</p>
    </div>
  </div>
  <div class="motif">
    <svg width="300" height="250" viewBox="0 0 300 250" fill="none" style="position:absolute;inset:0">
      <!-- shaded one-sigma region -->
      <path d="M104 194 C112 132 128 64 150 64 C172 64 188 132 196 194 Z" fill="rgba(232,163,61,.5)"/>
      <!-- normal curve -->
      <path d="M20 194 C70 194 96 64 150 64 C204 64 230 194 280 194" stroke="#E8A33D" stroke-width="4.5" fill="none" stroke-linecap="round"/>
      <!-- baseline -->
      <line x1="14" y1="194" x2="286" y2="194" stroke="#F3EDE0" stroke-width="3"/>
      <!-- mean line -->
      <line x1="150" y1="58" x2="150" y2="194" stroke="#F3EDE0" stroke-width="2.5" stroke-dasharray="5 6" opacity=".8"/>
      <!-- sigma bounds -->
      <line x1="104" y1="150" x2="104" y2="194" stroke="#F3EDE0" stroke-width="2" stroke-dasharray="4 5" opacity=".55"/>
      <line x1="196" y1="150" x2="196" y2="194" stroke="#F3EDE0" stroke-width="2" stroke-dasharray="4 5" opacity=".55"/>
      <!-- labels -->
      <text x="98" y="218" font-family="JetBrains Mono,monospace" font-size="15" fill="#A79C89">-&#963;</text>
      <text x="144" y="218" font-family="Fraunces,Georgia,serif" font-style="italic" font-size="19" font-weight="700" fill="#F3EDE0">&#956;</text>
      <text x="190" y="218" font-family="JetBrains Mono,monospace" font-size="15" fill="#A79C89">+&#963;</text>
      <text x="200" y="52" font-family="JetBrains Mono,monospace" font-size="14.5" font-weight="700" fill="#E8A33D">P(A|B)</text>
      <!-- dice-corner dots for probability -->
      <g fill="#F3EDE0" opacity=".8">
        <rect x="24" y="28" width="52" height="52" rx="12" stroke="#F3EDE0" stroke-width="2.5" fill="none"/>
        <circle cx="40" cy="44" r="4.5"/><circle cx="60" cy="64" r="4.5"/><circle cx="60" cy="44" r="4.5"/><circle cx="40" cy="64" r="4.5"/><circle cx="50" cy="54" r="4.5"/>
      </g>
    </svg>
  </div>
  <div class="bottom"><span>LIVE ONLINE CLASSES</span><span>learn.modernagecoders.com</span></div>
</div>
</body>
</html>
