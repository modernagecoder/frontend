<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;9..144,800&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:800px;height:450px;overflow:hidden}
:root{
  --paper:#FBF8F2; --ink:#26211B; --muted:#877C6C;
  --accent:#B4700F; --accent-soft:#F3E2C4;
  --dot:rgba(38,33,27,.07); --hairline:rgba(38,33,27,.16);
}
body{font-family:'Inter',system-ui,sans-serif;background:var(--paper);color:var(--ink);position:relative}
body::before{content:"";position:absolute;inset:0;background-image:radial-gradient(var(--dot) 1.2px,transparent 1.2px);background-size:26px 26px}
.card{position:absolute;inset:0;padding:30px 40px 24px;display:flex;flex-direction:column}
.top{display:flex;justify-content:space-between;align-items:center;position:relative;z-index:2}
.wordmark{display:flex;align-items:center;gap:11px;font-size:13px;font-weight:800;letter-spacing:.22em}
.mark{width:17px;height:17px;position:relative;display:inline-block}
.mark b{position:absolute;left:5px;top:5px;width:15px;height:15px;border:2.5px solid var(--ink)}
.mark i{position:absolute;left:0;top:0;width:15px;height:15px;background:var(--accent)}
.badge{border:2.5px solid var(--ink);padding:8px 16px;border-radius:999px;font-weight:800;font-size:13px;letter-spacing:.12em;background:var(--accent);color:#FBF8F2}
.main{flex:1;display:flex;align-items:center;position:relative;z-index:1}
.titleblock{max-width:430px}
.kicker{font-size:12.5px;font-weight:800;letter-spacing:.3em;color:var(--accent);margin-bottom:15px}
h1{font-family:'Fraunces',Georgia,serif;font-weight:800;font-size:56px;line-height:1.04;letter-spacing:-.01em}
.sub{margin-top:15px;font-size:16px;line-height:1.45;color:var(--muted);font-weight:500;max-width:380px}
.bottom{display:flex;justify-content:space-between;align-items:center;border-top:1.5px solid var(--hairline);padding-top:13px;font-size:11px;letter-spacing:.12em;font-weight:700;color:var(--muted);position:relative;z-index:2}
.motif{position:absolute;right:40px;top:50%;transform:translateY(-50%);width:290px;height:262px}
</style>
</head>
<body>
<div class="card">
  <div class="top">
    <div class="wordmark"><span class="mark"><b></b><i></i></span>MODERN AGE CODERS</div>
    <div class="badge">KIDS 5-10</div>
  </div>
  <div class="main">
    <div class="titleblock">
      <div class="kicker">MENTAL MATHS COURSE</div>
      <h1>Abacus &amp;<br>Mental Maths</h1>
      <p class="sub">Bead by bead to fast, confident arithmetic</p>
    </div>
  </div>
  <div class="motif">
    <svg width="290" height="262" viewBox="0 0 290 262" fill="none" style="position:absolute;inset:0">
      <!-- frame -->
      <rect x="18" y="12" width="254" height="234" rx="18" fill="#FFFFFF" stroke="#26211B" stroke-width="6"/>
      <!-- beam -->
      <line x1="18" y1="86" x2="272" y2="86" stroke="#26211B" stroke-width="6"/>
      <!-- rods -->
      <line x1="66" y1="18" x2="66" y2="240" stroke="#26211B" stroke-width="3" opacity=".5"/>
      <line x1="118" y1="18" x2="118" y2="240" stroke="#26211B" stroke-width="3" opacity=".5"/>
      <line x1="170" y1="18" x2="170" y2="240" stroke="#26211B" stroke-width="3" opacity=".5"/>
      <line x1="222" y1="18" x2="222" y2="240" stroke="#26211B" stroke-width="3" opacity=".5"/>
      <!-- upper beads (rod1 active = pushed down to beam) -->
      <ellipse cx="66" cy="70" rx="21" ry="14" fill="#E2593A" stroke="#26211B" stroke-width="3"/>
      <ellipse cx="118" cy="38" rx="21" ry="14" fill="#EFA63C" stroke="#26211B" stroke-width="3"/>
      <ellipse cx="170" cy="70" rx="21" ry="14" fill="#2E9E8F" stroke="#26211B" stroke-width="3"/>
      <ellipse cx="222" cy="38" rx="21" ry="14" fill="#4C8C5C" stroke="#26211B" stroke-width="3"/>
      <!-- lower beads rod1: two up at beam, two down -->
      <ellipse cx="66" cy="104" rx="21" ry="14" fill="#E2593A" stroke="#26211B" stroke-width="3"/>
      <ellipse cx="66" cy="134" rx="21" ry="14" fill="#E2593A" stroke="#26211B" stroke-width="3"/>
      <ellipse cx="66" cy="196" rx="21" ry="14" fill="#E2593A" stroke="#26211B" stroke-width="3"/>
      <ellipse cx="66" cy="226" rx="21" ry="14" fill="#E2593A" stroke="#26211B" stroke-width="3"/>
      <!-- rod2: one up, three down -->
      <ellipse cx="118" cy="104" rx="21" ry="14" fill="#EFA63C" stroke="#26211B" stroke-width="3"/>
      <ellipse cx="118" cy="166" rx="21" ry="14" fill="#EFA63C" stroke="#26211B" stroke-width="3"/>
      <ellipse cx="118" cy="196" rx="21" ry="14" fill="#EFA63C" stroke="#26211B" stroke-width="3"/>
      <ellipse cx="118" cy="226" rx="21" ry="14" fill="#EFA63C" stroke="#26211B" stroke-width="3"/>
      <!-- rod3: three up, one down -->
      <ellipse cx="170" cy="104" rx="21" ry="14" fill="#2E9E8F" stroke="#26211B" stroke-width="3"/>
      <ellipse cx="170" cy="134" rx="21" ry="14" fill="#2E9E8F" stroke="#26211B" stroke-width="3"/>
      <ellipse cx="170" cy="164" rx="21" ry="14" fill="#2E9E8F" stroke="#26211B" stroke-width="3"/>
      <ellipse cx="170" cy="226" rx="21" ry="14" fill="#2E9E8F" stroke="#26211B" stroke-width="3"/>
      <!-- rod4: all four down -->
      <ellipse cx="222" cy="136" rx="21" ry="14" fill="#4C8C5C" stroke="#26211B" stroke-width="3"/>
      <ellipse cx="222" cy="166" rx="21" ry="14" fill="#4C8C5C" stroke="#26211B" stroke-width="3"/>
      <ellipse cx="222" cy="196" rx="21" ry="14" fill="#4C8C5C" stroke="#26211B" stroke-width="3"/>
      <ellipse cx="222" cy="226" rx="21" ry="14" fill="#4C8C5C" stroke="#26211B" stroke-width="3"/>
    </svg>
  </div>
  <div class="bottom"><span>LIVE ONLINE CLASSES</span><span>learn.modernagecoders.com</span></div>
</div>
</body>
</html>
