<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="base.css"><style>
.fit{gap:26px}
.eyebrow{font-size:48px}
h1{font-size:96px}
.hl{background:linear-gradient(transparent 54%, #F3B7A6 54% 94%, transparent 94%);padding:0 6px}
.pb-wrap{margin-top:4px}
.pb-track{position:relative;height:108px;background:#FFFDF6;border:6px solid var(--ink);border-radius:26px;box-shadow:12px 13px 0 var(--ink);overflow:hidden}
.pb-fill{position:absolute;top:0;left:0;bottom:0;width:85%;background:var(--coral);border-right:6px solid var(--ink);display:flex;align-items:center;justify-content:flex-end}
.pb-fill .stripes{position:absolute;inset:0;background-image:repeating-linear-gradient(45deg,rgba(255,255,255,.14) 0 16px,transparent 16px 34px)}
.pb-pct{position:relative;font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:54px;color:#fff;padding-right:26px;text-shadow:2px 2px 0 rgba(32,30,36,.4)}
.pb-labels{display:flex;justify-content:space-between;margin-top:16px;align-items:baseline}
.pb-labels .lbl{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:26px;color:#8a8478}
.pb-labels .lbl.r{color:var(--pine);text-align:right}
.note{font-family:'Caveat',cursive;font-weight:700;font-size:52px;color:var(--pine);transform:rotate(-1.6deg);display:flex;align-items:center;gap:14px;margin-top:2px}
.note svg{flex:none}
.sub{font-size:34px}
</style></head>

    <div class="eyebrow">no degree required</div>
    <h1>Your first <span class="hl">AI project</span></h1>
    <div class="pb-wrap">
      <div class="pb-track">
        <div class="pb-fill"><span class="stripes"></span><span class="pb-pct">85%</span></div>
      </div>
      <div class="pb-labels">
        <span class="lbl">you</span>
        <span class="lbl r">first AI project</span>
      </div>
    </div>

      <svg width="46" height="34" viewBox="0 0 46 34" fill="none"><path d="M3 20 C 12 30, 24 30, 33 14" stroke="#15795A" stroke-width="5" stroke-linecap="round"/><path d="M33 14 L 27 18 M33 14 L 34 22" stroke="#15795A" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/></svg>

  </div></div>
  <div class="foot"><div class="fl"><span class="site">learn.modernagecoders.com</span><span class="tiny">For teens, students, adults</span></div><span class="pill">Start Python</span></div>
</div></body></html>
