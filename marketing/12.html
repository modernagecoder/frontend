<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="base.css"><style>
.diary{position:relative;background:#FFFDF6;border:5px solid var(--ink);border-radius:8px 8px 18px 8px;box-shadow:14px 15px 0 var(--ink);padding:40px 46px 44px 96px;overflow:hidden;
  background-image:linear-gradient(rgba(231,220,196,.7) 1.5px,transparent 1.5px);background-size:100% 52px;background-position:0 20px;transform:rotate(-.7deg);}
/* red margin line */
.diary::before{content:"";position:absolute;left:66px;top:0;bottom:0;width:3px;background:#D55B3D;opacity:.55;}
/* torn top edge */
.tear{position:absolute;left:0;right:0;top:-2px;height:16px;
  background:repeating-linear-gradient(135deg,transparent 0 12px,#FBF7EC 12px 24px);}
.dnote{font-family:'Caveat',cursive;font-weight:700;color:var(--coral);font-size:46px;transform:rotate(-1.6deg);line-height:1;margin-bottom:6px}
.dtitle{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:66px;line-height:1;letter-spacing:-1px;color:var(--ink);margin:2px 0 20px}
.hand{font-family:'Caveat',cursive;font-weight:700;color:#2b3a52;font-size:58px;line-height:1.15;letter-spacing:.3px}
.hand .q{color:#2b3a52}
.hand .oh{color:var(--coral)}
.hand .me{position:relative}
.pause{display:block;height:14px}
.subline{margin-top:26px}
.date{position:absolute;right:40px;top:26px;font-family:'Caveat',cursive;font-weight:700;font-size:34px;color:#8a8478;transform:rotate(1.2deg)}
.scrib{display:block;margin-top:6px}
</style></head>
<body><div class="frame">
  <div class="brand-row"><span class="logo"><svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg"><rect width="512" height="512" fill="#007bff"/><g fill="none" stroke="#fff" stroke-linecap="round" stroke-linejoin="round"><path d="M116 85 C 75 85, 70 120, 70 145 V 225 C 70 250, 50 256, 40 256 C 50 256, 70 262, 70 287 V 367 C 70 392, 75 427, 116 427" stroke-width="12"/><path d="M396 85 C 437 85, 442 120, 442 145 V 225 C 442 250, 462 256, 472 256 C 462 256, 442 262, 442 287 V 367 C 442 392, 437 427, 396 427" stroke-width="12"/><line x1="182" y1="190" x2="182" y2="300" stroke-width="10"/><line x1="330" y1="190" x2="330" y2="300" stroke-width="10"/><line x1="182" y1="190" x2="262" y2="256" stroke-width="10"/><line x1="330" y1="190" x2="250" y2="256" stroke-width="10"/></g><g fill="#fff"><circle cx="182" cy="190" r="41"/><circle cx="330" cy="190" r="41"/><path d="M182 256 A 41 41 0 1 0 182 338 C 182 338 182 380 148 412 L 140 420 C 160 420 200 390 223 300 A 41 41 0 0 0 182 256 Z"/><path d="M330 256 A 41 41 0 1 0 330 338 C 330 338 330 380 296 412 L 288 420 C 308 420 340 390 371 300 A 41 41 0 0 0 330 256 Z"/></g></svg></span><span class="brand-name">Modern Age Coders</span><span class="handle">@modern_age_coders</span></div>
  <div class="main"><div class="fit">
    <div class="diary">
      <div class="tear"></div>
      <div class="date">Tue, late</div>
      <div class="dnote">dear diary,</div>
      <div class="dtitle">Reading code I wrote 3&nbsp;months ago...</div>
      <div class="hand">
        <span class="q">"who wrote this?"</span><span class="pause"></span>
        <span class="q">"why did they do it like this??"</span><span class="pause"></span>
        <span class="me"><span class="oh">oh. it was me.</span>
          <svg class="scrib" width="230" height="16" viewBox="0 0 230 16" fill="none"><path d="M4 9 C 40 2, 70 14, 110 7 S 190 3, 226 10" stroke="#D55B3D" stroke-width="4" stroke-linecap="round"/></svg>
        </span>
      </div>
      <div class="sub subline">Learn to write code your future self can actually <span class="hl">read</span>. From day one.</div>
    </div>
  </div></div>
  <div class="foot"><div class="fl"><span class="site">learn.modernagecoders.com</span><span class="tiny">Habits from day one</span></div><span class="pill">Write clean code</span></div>
</div></body></html>
