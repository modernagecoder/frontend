<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="base.css">
<style>
.row{display:flex;align-items:center;gap:30px}
.left{flex:1.08;display:flex;flex-direction:column;gap:18px}
.right{flex:.92;display:flex;flex-direction:column;align-items:center;gap:14px}
h1{font-size:78px}
.ladder{display:flex;flex-direction:column;gap:12px;margin-top:4px}
.step{display:flex;align-items:center;gap:14px;font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:30px}
.step .n{width:44px;height:44px;flex:none;border-radius:12px;border:3px solid var(--ink);background:var(--yellow);display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:3px 3px 0 var(--ink)}
.step .n.p{background:#BFE0D2}.step .n.c{background:#F3B7A6}
.illo-card img{width:100%;height:auto;display:block}
.illo-card{width:100%}
.scribble{font-family:'Caveat',cursive;font-weight:700;font-size:40px;color:var(--pine);transform:rotate(-2deg)}
</style></head>
<body><div class="frame">
  <div class="brand-row">
    <span class="logo"><svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg"><rect width="512" height="512" fill="#007bff"/><g fill="none" stroke="#fff" stroke-linecap="round" stroke-linejoin="round"><path d="M116 85 C 75 85, 70 120, 70 145 V 225 C 70 250, 50 256, 40 256 C 50 256, 70 262, 70 287 V 367 C 70 392, 75 427, 116 427" stroke-width="12"/><path d="M396 85 C 437 85, 442 120, 442 145 V 225 C 442 250, 462 256, 472 256 C 462 256, 442 262, 442 287 V 367 C 442 392, 437 427, 396 427" stroke-width="12"/><line x1="182" y1="190" x2="182" y2="300" stroke-width="10"/><line x1="330" y1="190" x2="330" y2="300" stroke-width="10"/><line x1="182" y1="190" x2="262" y2="256" stroke-width="10"/><line x1="330" y1="190" x2="250" y2="256" stroke-width="10"/></g><g fill="#fff"><circle cx="182" cy="190" r="41"/><circle cx="330" cy="190" r="41"/><path d="M182 256 A 41 41 0 1 0 182 338 C 182 338 182 380 148 412 L 140 420 C 160 420 200 390 223 300 A 41 41 0 0 0 182 256 Z"/><path d="M330 256 A 41 41 0 1 0 330 338 C 330 338 330 380 296 412 L 288 420 C 308 420 340 390 371 300 A 41 41 0 0 0 330 256 Z"/></g></svg></span>
    <span class="brand-name">Modern Age Coders</span>
    <span class="brand-tag">// zero to job</span>
  </div>

  <div class="main"><div class="fit">
   <div class="row">
    <div class="left">
      <span class="eyebrow">a real path, not a vibe</span>
      <h1>From your first<br>loop to your<br>first <span class="coral">offer</span>.</h1>
      <div class="ladder">
        <div class="step"><span class="n">1</span> Write your first working code</div>
        <div class="step"><span class="n p">2</span> Build real projects you own</div>
        <div class="step"><span class="n c">3</span> Portfolio, interviews, job-ready</div>
      </div>
      <div class="cta" style="margin-top:8px">Map my path <span class="arw">&rarr;</span></div>
    </div>
    <div class="right">
      <div class="illo-card"><img src="art/career.svg" alt=""></div>
      <div class="scribble">we walk it with you</div>
    </div>
   </div>
  </div></div>

  <div class="foot">
    <span class="site">learn.modernagecoders.com</span>
    <span class="pill">Book a free demo</span>
  </div>
</div></body></html>
